<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>小洛整理场照后期提示词合集</title>
  <style>
    :root {
      --bg: #090b11;
      --panel: rgba(18, 21, 31, .82);
      --panel-solid: #12151f;
      --panel-2: #171b27;
      --line: rgba(255, 255, 255, .09);
      --line-strong: rgba(255, 255, 255, .16);
      --text: #f3efe8;
      --muted: #9c9cab;
      --gold: #e5bd72;
      --gold-soft: #f3d9a6;
      --violet: #a790ff;
      --cyan: #65d6c5;
      --coral: #ee9270;
      --rose: #e184ae;
      --shadow: 0 24px 80px rgba(0,0,0,.36);
      --radius: 24px;
      --sidebar: 286px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 88% 8%, rgba(167,144,255,.12), transparent 28%),
        radial-gradient(circle at 12% 88%, rgba(101,214,197,.08), transparent 30%),
        var(--bg);
      font-family: Inter, "SF Pro Display", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .18;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.12'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
      z-index: 20;
    }

    button, input { font: inherit; }
    button { color: inherit; }
    .app { min-height: 100vh; }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      width: var(--sidebar);
      padding: 30px 22px 24px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: rgba(9,11,17,.78);
      backdrop-filter: blur(26px);
      z-index: 10;
    }

    .brand { padding: 3px 8px 28px; }
    .brand-mark {
      width: 42px; height: 42px; margin-bottom: 18px;
      display: grid; place-items: center;
      border: 1px solid rgba(229,189,114,.38);
      border-radius: 14px;
      color: var(--gold);
      background: linear-gradient(145deg, rgba(229,189,114,.14), rgba(229,189,114,.025));
      box-shadow: inset 0 1px rgba(255,255,255,.1), 0 14px 34px rgba(0,0,0,.2);
      font: 600 19px/1 Georgia, serif;
    }
    .brand h1 { margin: 0; font: 500 21px/1.35 Georgia, "Songti SC", serif; letter-spacing: .04em; }
    .brand p { margin: 8px 0 0; color: var(--muted); font-size: 12px; letter-spacing: .08em; }

    .search-wrap { position: relative; margin-bottom: 22px; }
    .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #7d7d89; }
    .search-wrap input {
      width: 100%; height: 45px; padding: 0 42px 0 42px;
      color: var(--text); outline: none;
      border: 1px solid var(--line); border-radius: 14px;
      background: rgba(255,255,255,.035);
      transition: .2s ease;
    }
    .search-wrap input:focus { border-color: rgba(229,189,114,.45); box-shadow: 0 0 0 4px rgba(229,189,114,.06); }
    .shortcut { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #6f6f7a; font-size: 11px; }

    .nav-label { margin: 0 10px 8px; color: #656571; font-size: 10px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; }
    .nav { display: grid; gap: 5px; }
    .nav-btn {
      width: 100%; min-height: 47px; padding: 0 12px;
      display: flex; align-items: center; gap: 12px;
      border: 0; border-radius: 13px; background: transparent; cursor: pointer;
      color: #aaaab5; text-align: left; transition: .18s ease;
    }
    .nav-btn:hover { color: var(--text); background: rgba(255,255,255,.045); }
    .nav-btn.active { color: var(--text); background: linear-gradient(90deg, rgba(229,189,114,.13), rgba(229,189,114,.035)); }
    .nav-dot { width: 8px; height: 8px; border: 1px solid currentColor; border-radius: 50%; box-shadow: 0 0 0 4px color-mix(in srgb, currentColor 10%, transparent); }
    .nav-btn.active .nav-dot { background: currentColor; }
    .nav-name { flex: 1; font-size: 13px; }
    .nav-count { color: #656571; font-size: 11px; font-variant-numeric: tabular-nums; }
    .nav-btn[data-section="formula"] { color: var(--gold-soft); }
    .nav-btn[data-section="oneClick"] { color: var(--violet); }
    .nav-btn[data-section="half"] { color: var(--cyan); }
    .nav-btn[data-section="full"] { color: var(--coral); }
    .nav-btn[data-section="examples"] { color: var(--rose); }

    .sidebar-foot { margin-top: auto; padding: 20px 9px 0; border-top: 1px solid var(--line); color: #686874; font-size: 11px; line-height: 1.65; }
    .main { margin-left: var(--sidebar); min-height: 100vh; }
    .topbar {
      height: 78px; padding: 0 46px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 8;
      border-bottom: 1px solid var(--line);
      background: rgba(9,11,17,.72); backdrop-filter: blur(24px);
    }
    .breadcrumb { display: flex; align-items: center; gap: 10px; color: #7d7d88; font-size: 12px; }
    .breadcrumb strong { color: var(--text); font-weight: 550; }
    .top-actions { display: flex; gap: 9px; }
    .button {
      min-height: 38px; padding: 0 15px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border: 1px solid var(--line-strong); border-radius: 11px; cursor: pointer;
      background: rgba(255,255,255,.035); color: #c7c5ca; font-size: 12px; transition: .18s ease;
    }
    .button:hover { transform: translateY(-1px); border-color: rgba(229,189,114,.45); color: var(--text); }
    .button.primary { color: #17140e; border-color: transparent; background: linear-gradient(135deg, #f0cf91, #d6a757); box-shadow: 0 10px 30px rgba(213,168,86,.17); font-weight: 700; }

    .content { max-width: 1500px; margin: 0 auto; padding: 52px 46px 86px; }
    .eyebrow { margin: 0 0 15px; color: var(--gold); font-size: 10px; font-weight: 800; letter-spacing: .22em; text-transform: uppercase; }
    .hero-title { margin: 0; max-width: 830px; font: 500 clamp(36px,4vw,64px)/1.1 Georgia, "Songti SC", serif; letter-spacing: -.025em; }
    .hero-title em { color: var(--gold-soft); font-style: normal; }
    .hero-sub { max-width: 680px; margin: 20px 0 0; color: var(--muted); font-size: 15px; line-height: 1.8; }
    .stats { display: flex; flex-wrap: wrap; gap: 28px; margin-top: 30px; }
    .stat { min-width: 96px; }
    .stat strong { display: block; font: 500 28px/1 Georgia, serif; }
    .stat span { display: block; margin-top: 7px; color: #777783; font-size: 10px; letter-spacing: .13em; text-transform: uppercase; }

    .mindmap {
      position: relative; min-height: 610px; margin-top: 44px;
      border: 1px solid var(--line); border-radius: 32px; overflow: hidden;
      background:
        linear-gradient(rgba(255,255,255,.026) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.026) 1px, transparent 1px),
        radial-gradient(circle at 50% 50%, rgba(229,189,114,.055), transparent 24%),
        rgba(16,18,27,.68);
      background-size: 42px 42px, 42px 42px, auto, auto;
      box-shadow: var(--shadow), inset 0 1px rgba(255,255,255,.035);
    }
    .map-kicker { position: absolute; left: 26px; top: 24px; color: #676773; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; }
    .connections { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    .connections path { fill: none; stroke-width: 1.35; opacity: .62; }
    .map-root {
      position: absolute; left: 50%; top: 47%; transform: translate(-50%,-50%);
      width: 220px; aspect-ratio: 1; padding: 26px; display: grid; place-items: center; text-align: center;
      border-radius: 50%; border: 1px solid rgba(229,189,114,.38);
      background: radial-gradient(circle at 35% 28%, rgba(239,207,145,.18), rgba(20,21,28,.96) 68%);
      box-shadow: 0 0 0 13px rgba(229,189,114,.035), 0 24px 70px rgba(0,0,0,.42), inset 0 1px rgba(255,255,255,.11);
    }
    .map-root span { display: block; color: var(--gold); font-size: 10px; letter-spacing: .18em; text-transform: uppercase; }
    .map-root strong { display: block; margin-top: 10px; font: 500 24px/1.28 Georgia, "Songti SC", serif; }
    .map-root small { display: block; margin-top: 9px; color: #85858f; font-size: 11px; }
    .map-node {
      position: absolute; width: 220px; padding: 18px 18px 17px;
      border: 1px solid var(--line); border-radius: 19px; cursor: pointer; text-align: left;
      background: rgba(19,22,32,.93); box-shadow: 0 18px 46px rgba(0,0,0,.25), inset 0 1px rgba(255,255,255,.04);
      transition: .22s cubic-bezier(.2,.8,.2,1);
    }
    .map-node:hover { transform: translateY(-4px); border-color: color-mix(in srgb, var(--accent) 52%, transparent); box-shadow: 0 24px 60px rgba(0,0,0,.35), 0 0 0 4px color-mix(in srgb, var(--accent) 6%, transparent); }
    .map-node .node-top { display: flex; align-items: center; justify-content: space-between; }
    .map-node .node-index { color: var(--accent); font: 500 12px/1 Georgia, serif; }
    .map-node .node-count { color: #686873; font-size: 10px; }
    .map-node strong { display: block; margin-top: 13px; font-size: 15px; font-weight: 600; }
    .map-node p { margin: 7px 0 0; color: #8e8e9b; font-size: 11px; line-height: 1.55; }
    .map-node.formula { --accent: var(--gold); left: 7%; top: 13%; }
    .map-node.oneClick { --accent: var(--violet); left: 5%; top: 59%; }
    .map-node.half { --accent: var(--cyan); right: 6%; top: 10%; }
    .map-node.full { --accent: var(--coral); right: 4%; top: 55%; }
    .map-node.examples { --accent: var(--rose); left: 50%; bottom: 4%; transform: translateX(-50%); }
    .map-node.examples:hover { transform: translateX(-50%) translateY(-4px); }

    .route-strip { margin-top: 22px; padding: 20px 22px; display: flex; align-items: center; gap: 14px; border: 1px solid var(--line); border-radius: 18px; background: rgba(255,255,255,.024); color: #8f8f9b; font-size: 12px; }
    .route-strip b { color: var(--text); font-weight: 600; }
    .route-arrow { color: #4e4e58; }

    .section-head { display: flex; align-items: end; justify-content: space-between; gap: 24px; margin-bottom: 34px; }
    .section-head h2 { margin: 0; font: 500 clamp(32px,4vw,52px)/1.15 Georgia, "Songti SC", serif; }
    .section-head p { max-width: 600px; margin: 13px 0 0; color: var(--muted); line-height: 1.7; font-size: 14px; }
    .section-tools { display: flex; gap: 8px; flex-shrink: 0; }
    .section-rule { height: 1px; margin: 0 0 30px; background: linear-gradient(90deg, var(--accent, var(--gold)), transparent 65%); opacity: .45; }

    .group { margin-top: 38px; }
    .group:first-child { margin-top: 0; }
    .group-title { display: flex; align-items: center; gap: 12px; margin: 0 0 16px; font-size: 13px; }
    .group-title::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--accent, var(--violet)); box-shadow: 0 0 0 5px color-mix(in srgb, var(--accent, var(--violet)) 10%, transparent); }
    .group-title span { color: #6f6f7b; font-size: 11px; font-weight: 400; }
    .card-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
    .prompt-card {
      position: relative; min-width: 0; padding: 21px;
      border: 1px solid var(--line); border-radius: 19px;
      background: linear-gradient(145deg, rgba(255,255,255,.04), rgba(255,255,255,.018));
      box-shadow: inset 0 1px rgba(255,255,255,.025); transition: .2s ease;
    }
    .prompt-card:hover { border-color: var(--line-strong); background: linear-gradient(145deg, rgba(255,255,255,.055), rgba(255,255,255,.022)); }
    .card-top { display: flex; align-items: flex-start; gap: 12px; }
    .card-title { flex: 1; min-width: 0; margin: 0; font-size: 14px; font-weight: 650; line-height: 1.45; }
    .tag { display: inline-flex; align-items: center; min-height: 23px; padding: 0 8px; border: 1px solid var(--line); border-radius: 999px; color: #868691; background: rgba(255,255,255,.025); font-size: 9px; letter-spacing: .06em; white-space: nowrap; }
    .copy-btn {
      flex: none; width: 34px; height: 34px; display: grid; place-items: center;
      border: 1px solid var(--line); border-radius: 10px; background: rgba(255,255,255,.025); cursor: pointer; color: #8c8c98;
      transition: .18s ease;
    }
    .copy-btn:hover { color: var(--gold); border-color: rgba(229,189,114,.35); }
    .copy-btn.copied { color: var(--cyan); border-color: rgba(101,214,197,.38); }
    .prompt-text { margin: 15px 0 0; color: #b1afb5; font-size: 12px; line-height: 1.82; white-space: pre-wrap; word-break: break-word; }
    .prompt-text.clamp { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 5; overflow: hidden; }
    .prompt-card.expanded .prompt-text.clamp { display: block; }
    .expand-btn { margin-top: 13px; padding: 0; border: 0; background: none; color: var(--gold); font-size: 11px; cursor: pointer; }

    .formula-stack { display: grid; gap: 0; max-width: 1040px; margin: 0 auto; }
    .formula-row { position: relative; display: grid; grid-template-columns: 72px 1fr; gap: 22px; padding-bottom: 20px; }
    .formula-row:not(:last-child)::before { content: ""; position: absolute; left: 35px; top: 64px; bottom: -3px; width: 1px; background: linear-gradient(var(--gold), rgba(229,189,114,.12)); }
    .formula-number { width: 72px; height: 72px; display: grid; place-items: center; border: 1px solid rgba(229,189,114,.25); border-radius: 50%; color: var(--gold); background: rgba(229,189,114,.055); font: 500 16px/1 Georgia, serif; }
    .formula-card { padding: 24px; border: 1px solid var(--line); border-radius: 20px; background: var(--panel); }
    .formula-card .card-title { font-family: Georgia, "Songti SC", serif; font-size: 18px; font-weight: 500; }

    .workflow { position: relative; max-width: 1120px; margin: 0 auto; }
    .workflow::before { content: ""; position: absolute; left: 31px; top: 33px; bottom: 33px; width: 1px; background: linear-gradient(var(--accent), rgba(255,255,255,.05)); opacity: .55; }
    .step { position: relative; display: grid; grid-template-columns: 64px 1fr; gap: 22px; margin-bottom: 20px; }
    .step:last-child { margin-bottom: 0; }
    .step-index { position: relative; z-index: 1; width: 64px; height: 64px; display: grid; place-items: center; border: 1px solid color-mix(in srgb, var(--accent) 38%, transparent); border-radius: 18px; color: var(--accent); background: var(--panel-solid); font: 500 20px/1 Georgia, serif; box-shadow: 0 0 0 7px var(--bg); }
    .step .prompt-card { padding: 24px; }
    .step-tool { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 26%, transparent); }

    .example-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 16px; }
    .example-card { overflow: hidden; padding: 0; }
    .example-image { position: relative; aspect-ratio: 16/9; overflow: hidden; background: #161821; }
    .example-image img { width: 100%; height: 100%; display: block; object-fit: cover; transition: .4s ease; }
    .example-card:hover .example-image img { transform: scale(1.025); }
    .example-number { position: absolute; left: 12px; top: 12px; min-width: 30px; height: 25px; padding: 0 8px; display: grid; place-items: center; border: 1px solid rgba(255,255,255,.18); border-radius: 9px; color: #fff; background: rgba(8,9,14,.62); backdrop-filter: blur(12px); font: 500 11px/1 Georgia, serif; }
    .example-body { padding: 18px; }
    .qr-block { margin-top: 16px; padding: 18px; display: grid; place-items: center; gap: 10px; border: 1px solid var(--line); border-radius: 16px; background: rgba(255,255,255,.025); }
    .qr-block img { width: min(100%, 320px); height: auto; display: block; border-radius: 12px; background: #fff; }
    .qr-caption { color: #7f7f8b; font-size: 10px; letter-spacing: .08em; }

    .search-results { display: grid; gap: 14px; }
    .search-summary { margin: -18px 0 26px; color: #767681; font-size: 12px; }
    mark { color: var(--text); background: rgba(229,189,114,.24); border-radius: 3px; }
    .empty { padding: 90px 24px; text-align: center; border: 1px dashed var(--line-strong); border-radius: 22px; color: #777783; }
    .empty strong { display: block; margin-bottom: 8px; color: var(--text); font: 500 24px/1.3 Georgia, "Songti SC", serif; }

    .toast { position: fixed; left: calc(var(--sidebar) + (100vw - var(--sidebar))/2); bottom: 30px; transform: translate(-50%, 18px); min-width: 180px; padding: 12px 17px; border: 1px solid rgba(101,214,197,.28); border-radius: 12px; color: #bdf2e9; background: rgba(15,29,29,.9); backdrop-filter: blur(16px); box-shadow: var(--shadow); font-size: 12px; text-align: center; opacity: 0; pointer-events: none; transition: .22s ease; z-index: 30; }
    .toast.show { opacity: 1; transform: translate(-50%,0); }
    .mobile-menu { display: none; }

    @media (max-width: 1100px) {
      :root { --sidebar: 240px; }
      .content { padding-left: 30px; padding-right: 30px; }
      .topbar { padding: 0 30px; }
      .map-node { width: 195px; }
      .map-node.formula { left: 3%; }
      .map-node.oneClick { left: 2%; }
      .map-node.half { right: 3%; }
      .map-node.full { right: 2%; }
      .example-grid { grid-template-columns: repeat(2,minmax(0,1fr)); }
    }
    @media (max-width: 820px) {
      :root { --sidebar: 0px; }
      .sidebar { transform: translateX(-100%); transition: .22s ease; width: 280px; }
      body.menu-open .sidebar { transform: translateX(0); }
      .main { margin-left: 0; }
      .mobile-menu { display: grid; place-items: center; width: 38px; height: 38px; border: 1px solid var(--line); border-radius: 10px; background: rgba(255,255,255,.03); }
      .topbar { height: 68px; padding: 0 18px; }
      .top-actions .button:not(.primary) { display: none; }
      .content { padding: 34px 18px 64px; }
      .mindmap { min-height: auto; padding: 76px 18px 22px; display: grid; gap: 12px; }
      .connections, .map-root { display: none; }
      .map-node, .map-node.formula, .map-node.oneClick, .map-node.half, .map-node.full, .map-node.examples { position: static; width: 100%; transform: none; }
      .map-node.examples:hover { transform: translateY(-4px); }
      .card-grid, .example-grid { grid-template-columns: 1fr; }
      .section-head { align-items: flex-start; flex-direction: column; }
      .section-tools { width: 100%; }
      .section-tools .button { flex: 1; }
      .formula-row { grid-template-columns: 48px 1fr; gap: 13px; }
      .formula-number { width: 48px; height: 48px; }
      .formula-row:not(:last-child)::before { left: 23px; top: 48px; }
      .workflow::before { left: 23px; }
      .step { grid-template-columns: 48px 1fr; gap: 13px; }
      .step-index { width: 48px; height: 48px; border-radius: 14px; }
      .route-strip { align-items: flex-start; flex-wrap: wrap; }
      .toast { left: 50%; }
    }

    /* Liquid frost theme — restrained translucency with soft refractive edges */
    :root {
      --bg: #0a101a;
      --panel: rgba(24, 33, 49, .58);
      --panel-solid: #121b2a;
      --panel-2: rgba(30, 41, 59, .7);
      --line: rgba(218, 235, 255, .11);
      --line-strong: rgba(224, 239, 255, .2);
      --text: #f4f7fb;
      --muted: #9da9b8;
      --gold: #b9dcff;
      --gold-soft: #d7ebff;
      --violet: #ae9bff;
      --cyan: #67dfcc;
      --coral: #ff9e7a;
      --rose: #f08fbd;
      --shadow: 0 26px 80px rgba(0, 5, 15, .34);
      --radius: 26px;
      --sidebar: 264px;
    }
    body {
      background:
        radial-gradient(circle at 76% -8%, rgba(104, 164, 255, .19), transparent 31%),
        radial-gradient(circle at 4% 76%, rgba(97, 224, 204, .11), transparent 28%),
        radial-gradient(circle at 95% 72%, rgba(174, 155, 255, .10), transparent 27%),
        linear-gradient(145deg, #09101a 0%, #0c1421 48%, #0a101a 100%);
      font-family: "SF Pro Display", "SF Pro Text", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
    }
    body::before { opacity: .075; mix-blend-mode: screen; }
    .sidebar {
      padding: 24px 18px 20px;
      border-right-color: rgba(226, 239, 255, .11);
      background: linear-gradient(165deg, rgba(24, 34, 50, .7), rgba(10, 16, 26, .58));
      box-shadow: inset -1px 0 rgba(255,255,255,.035), 18px 0 70px rgba(0,7,18,.2);
      backdrop-filter: blur(24px) saturate(125%);
      -webkit-backdrop-filter: blur(24px) saturate(125%);
    }
    .brand { padding: 2px 9px 22px; }
    .brand-mark {
      width: 40px; height: 40px; margin-bottom: 15px;
      border-color: rgba(191, 224, 255, .24);
      border-radius: 15px;
      color: #d9edff;
      background: linear-gradient(145deg, rgba(220,240,255,.19), rgba(130,178,255,.065));
      box-shadow: inset 0 1px rgba(255,255,255,.25), 0 10px 28px rgba(2,9,20,.24);
      font-family: "SF Pro Display", "PingFang SC", sans-serif;
    }
    .brand h1 { font: 600 19px/1.38 "SF Pro Display", "PingFang SC", sans-serif; letter-spacing: -.015em; }
    .brand p { margin-top: 7px; color: #748194; font-size: 9px; letter-spacing: .2em; }
    .search-wrap { margin-bottom: 19px; }
    .search-wrap input {
      height: 44px;
      border-color: rgba(220,237,255,.12);
      border-radius: 15px;
      background: linear-gradient(145deg, rgba(255,255,255,.075), rgba(255,255,255,.025));
      box-shadow: inset 0 1px rgba(255,255,255,.07);
      backdrop-filter: blur(12px);
    }

  <script>
    const DATA = {"title": "小洛整理场照后期提示词合集", "subtitle": "从一键精修到完整场照合成 · 可视化提示词工作台", "formula": [{"id": "formula-prefix", "index": "01", "title": "固定前缀 · 锁定原图", "prompt": "你需要去做一次cos后期合成，你需要在处理时遵守以下准则：不改变原有构图，不改变原图光影，不改变原有饱和度，不改变原图色调；不做旋转缩放处理，不改变人物姿势。"}, {"id": "formula-body", "index": "02", "title": "主体描述 · 自定义需求", "prompt": "按照自己的想法or问豆包、GPT\n自行输入"}, {"id": "formula-limit", "index": "03", "title": "镜头限定 · 统一透视", "prompt": "符合35MM，F2.8光圈的透视效果，微仰拍的视角，匹配原图色调饱和度"}, {"id": "formula-suffix", "index": "04", "title": "质感后缀 · 统一成片", "prompt": "顶级游戏CG级画风质感，3D建模材质，优化细节及其纹理质感。"}], "formulaText": "你需要去做一次cos后期合成，你需要在处理时遵守以下准则：不改变原有构图，不改变原图光影，不改变原有饱和度，不改变原图色调；不做旋转缩放处理，不改变人物姿势。\n\n【主体 / 场景 / 特效需求】\n按照自己的想法or问豆包、GPT\n自行输入\n\n符合35MM，F2.8光圈的透视效果，微仰拍的视角，匹配原图色调饱和度\n\n顶级游戏CG级画风质感，3D建模材质，优化细节及其纹理质感。", "oneClick": [{"id": "one-2", "title": "一键高清", "prompt": "让此区域变得清晰锐利，提高分辨率，优化细节与纹理", "group": "画质与细节"}, {"id": "one-3", "title": "一键去除背景杂物", "prompt": "移除背景路人、闪光灯和灯架以及灯的炫光，只保留人物主体和干净的场馆，保持构图光影色彩与原图一致，不缩放旋转，保持人物动作不变，不改场馆建筑本身结构以及原本透视效果，无缝融合。", "group": "清理与修复"}, {"id": "one-4", "title": "一键去除梯子、箱子", "prompt": "移除人物坐着的梯子，保持人物动作不变", "group": "清理与修复"}, {"id": "one-5", "title": "一键补全", "prompt": "以红色部分为基础，补全人物手中蓝白色刀的刀柄部分", "group": "清理与修复"}, {"id": "one-6", "title": "一键替换", "prompt": "将人物坐着的梯子替换成一个粗壮的树桩", "group": "道具与材质"}, {"id": "one-7", "title": "一键去除杂毛碎发", "prompt": "去除人物杂乱毛糙的单根头发以及碎发，让头发整体变得顺滑", "group": "清理与修复"}, {"id": "one-8", "title": "一键替换头发", "prompt": "将人物的发型变得像参考图中一样的形状，不改变头部其他部分，只改变头发部分", "group": "假发与发丝"}, {"id": "one-9", "title": "一键替换美瞳", "prompt": "将人物的眼睛变的像蓝紫色星空一样的瞳色，只改变眼睛瞳孔部分，不改变其他面部部分，眼镜部分也保持不变", "group": "面部与妆容"}, {"id": "one-10", "title": "一键头发飘逸", "prompt": "去除人物杂乱毛糙的单根头发以及碎发，让人物的黑色长发被风向右吹起，呈现自然飘起的状态，让头发整体变得顺滑且飘逸", "group": "假发与发丝"}, {"id": "one-11", "title": "一键Cup变大", "prompt": "让衣服变得柔顺无褶皱，人物身材变得丰满，不改变人物衣服样式、材质。不改变人物动作，让人物的罩杯尺寸变为F杯以上。", "group": "体态与肢体"}, {"id": "one-12", "title": "一键裙摆飘逸", "prompt": "让人物的裙摆被风向右吹起，呈现自然飘起的状态，让裙子整体变得顺滑飘逸，如同真实衣物质感一样。", "group": "服装与布料"}, {"id": "one-13", "title": "一键下雪", "prompt": "让整个场景下起大雪，与人物、道具等接触的地方有自然的积雪。", "group": "氛围与天气"}, {"id": "one-14", "title": "一键下雨", "prompt": "让整个场景下期大雨，在人物身上已经与场景接触的地方有溅起的雨水", "group": "氛围与天气"}, {"id": "one-15", "title": "一键花瓣飞舞", "prompt": "整个场景飞舞着桃花花瓣，被风吹的向右飘起，部分花瓣前后错落，靠近镜头的有一定高斯模糊和动态模糊，符合场景透视", "group": "氛围与天气"}, {"id": "one-16", "title": "一键落叶纷飞", "prompt": "整个场景有纷飞的落叶，被风吹的向右飘落，部分落叶前后错落，靠近镜头的有一定高斯模糊和动态模糊，符合场景透视", "group": "氛围与天气"}, {"id": "one-17", "title": "一键动物道具复活", "prompt": "将人物脖子上的道具白蛇变成真实生动的效果，凶狠的盯着左边", "group": "道具与材质"}, {"id": "one-18", "title": "一键武器道具真实化", "prompt": "让人物手中的武器道具有真实质感，不改变武器原本构造，武器头部里镶嵌着一个冰蓝色水晶，并且武器上结了少量冰晶，法杖的杖杆部分是蓝色的。", "group": "道具与材质"}, {"id": "one-19", "title": "一键腹肌", "prompt": "将图中人物的腹部变为标准的八块腹肌", "group": "体态与肢体"}, {"id": "one-20", "title": "一键女生马甲线", "prompt": "优化女生人物身材比例，使手臂更加纤细自然，腰部更瘦更紧致，腹部呈现清晰但不过度夸张的马甲线，整体体型健康匀称、线条流畅。保持原人物姿势、表情、服装、光影、背景不变，保持身体上的质感和程度完全不变，避免改变人物身份和画面风格。", "group": "体态与肢体"}, {"id": "one-21", "title": "一键亮调背景去头发黑边", "prompt": "请以当前图片为基础进行局部精修，保持人物主体整体不变，不重做人像，不改变构图，不改变头部位置，不改变人物五官、表情和神态，不改变头顶苹果，不改变服装与背景氛围。\n本次仅针对头发外侧边缘的抠图黑边痕迹进行清理，并适度优化头发质感，让头发边缘更自然干净、更有空气感。\n修正要求\n主体严格锁定\n保留人物的脸部轮廓、五官比例、眼神、表情、妆容、头部朝向、头部位置、发型整体结构、发色、服装领口、披风边缘、肩部结构，以及原图整体构图、景别和画面氛围。\n不要改脸，不要换脸，不要改变五官，不要改变表情，不要改变头部角度，不要改变苹果，不要改变服装，不要降低人物主体清晰度。\n清理头发边缘黑边\n重点清除头发顶部外轮廓、左右两侧发梢、靠近背景处的头发边缘，以及细碎发丝末端周围残留的黑边、暗边、脏边和不自然硬边。\n清理后头发边缘要自然过渡，不要修糊，不要出现白边、灰边、边缘发光、发虚或新的抠图痕迹。\n保留发丝层次感，不要把头发边缘修成整块生硬轮廓，要让头发与背景衔接自然干净，像真实拍摄而不是粗糙抠图。\n头发质感轻微优化\n在清除黑边的基础上，适度优化头发，让头发更自然、更柔顺、更有空气感，但不能改变原本发型设计。\n保持原本发型的整体轮廓、长度、刘海走向和层次关系不变；可增加少量自然细碎发丝，让边缘更真实；发丝层次更清楚、发梢可轻微自然散开，但不要过分浓密、蓬松、炸毛或凌乱。\n整体仍要保留 cos 假发质感，但看起来更自然、更高级。\n重点限制\n人物五官、脸型结构、眼睛形状、视线方向、鼻子、嘴巴、下颌线、人物气质、头部大小、头部位置、头部朝向、服装领口、披风边缘、金属装饰、背景整体颜色与氛围都必须保持不变。\n不要因为修头发而连带修改脸型、眉眼、鼻口或服装边缘。\n画面质感要求\n整体保持真实摄影质感和高级 cos 场照修图质感。\n发丝细节自然清晰，边缘干净但不过度锐化；不要过度磨皮，不要塑料感，不要明显 AI 重绘感，不要让头发边缘假、硬、糊、脏。\n最终效果应像专业后期对头发边缘进行精修，并加入轻微自然风感，而不是重做一颗新头。\n负面限制\n不要改脸，不要换脸，不要改变五官，不要改变头部位置；\n不要夸张吹风，不要让头发大幅飞起；\n不要新增大量碎发，不要炸毛，不要凌乱；\n不要出现新的白边、黑边、锯齿边、发虚边；\n不要改变背景，不要改变色调，不要改变整体氛围；\n不要过度磨皮，不要过度锐化，不要出现明显 AI 修图痕迹。", "group": "假发与发丝"}, {"id": "one-22", "title": "一键亮调背景去全身黑边", "prompt": "请以当前图片为基础进行局部精修与全身细化优化，保持人物主体整体不变，不重做人像，不改变构图，不改变头部位置，不改变人物五官、表情和神态，不改变人物主体动作，不改变服装与背景氛围。\n本次修正重点是针对人物全身边缘、主体轮廓、服装边缘、发丝边缘、手部与腿部边缘、道具边缘以及人物整体质感进行精修处理，清理抠图痕迹，优化主体边缘与细节，让人物整体更自然干净、更有空气感和真实摄影质感，同时保持原图人物完全一致，不产生明显 AI 重绘感。\n\n修正要求\n一、主体严格锁定\n保留人物的脸部轮廓、五官比例、眼神、表情、妆容、头部朝向、头部位置、发型整体结构、发色、服装结构、服装配色、服装边缘、肩部结构、手部姿态、腿部姿态、身体比例、人物动作、人物在画面中的位置、大小、占比，以及原图整体构图、景别和画面氛围。\n不要改脸，不要换脸，不要改变五官，不要改变表情，不要改变头部角度，不要改变发型整体设计，不要改变服装，不要改变人物动作，不要改变人物比例，不要降低人物主体清晰度。\n如果原图中有头顶装饰、发饰、配件、武器或其他道具，这些也都必须保持不变，不要改动其造型、位置、大小和结构。\n\n二、清理人物全身边缘抠图痕迹\n重点清除人物全身外轮廓周围残留的黑边、暗边、脏边、不自然硬边、发虚边和粗糙抠图痕迹。\n●处理范围包括但不限于：头发顶部外轮廓\n●左右两侧发梢与细碎发丝边缘\n●脸部轮廓与发丝交界处\n●颈部、肩膀、手臂、手肘、手腕等边缘\n●手指边缘与背景交界处\n●服装边缘\n●腿部、膝盖、小腿、脚踝、鞋子边缘\n●毛绒装饰、尾部装饰、金属饰品、武器边缘\n●人物与地面接触处、人物与背景交接处\n清理后，人物边缘要自然过渡，不要修糊，不要出现白边、灰边、边缘发光、边缘断裂、边缘发虚或新的抠图痕迹。\n要让人物整体边缘干净利落，但不能修成过于生硬的硬轮廓线。\n三、人物整体质感轻微优化\n在清除边缘问题的基础上，适度优化人物全身质感，让主体看起来更自然、更完整、更高级，但不能改变原本人物设计。\n1. 头发部分\n保持原本发型的整体轮廓、长度、刘海走向、层次关系和发色不变。\n可适度增加少量自然细碎发丝，让发丝边缘更真实、更有空气感；但不要过分浓密、蓬松、炸毛或凌乱。\n整体仍要保留 cos 假发质感，但看起来更自然、更高级。\n2. 面部与皮肤部分\n保持脸型结构、五官比例、眼神、神态、妆容完全不变。\n可以对皮肤做轻微优化，让肤质更干净细腻、明暗更自然，但不能过度磨皮，不能塑料感，不能失去真实摄影皮肤纹理。\n不要改变鼻子、嘴巴、眼睛、下颌线，不要因为精修影响人物原本气质。\n3. 服装部分\n保持服装整体结构、版型、颜色、纹样、配饰、金属件和层次关系不变。\n可轻微优化服装边缘，使布料边缘更干净自然；适当增强服装褶皱、布料层次和材质清晰度，让服装更有真实质感。\n不要把服装改形，不要重画服装，不要改变服装花纹，不要改变服装受光逻辑。4. 手部与腿部部分\n保持手部姿势、手指形态、腿部姿态、身体比例完全不变。\n优化手部和腿部边缘，让边缘更自然、干净，没有脏边和锯齿感。\n可以轻微优化皮肤和受光，让肢体质感更统一，但不要让手变形，不要让腿部比例变化，不要过度磨皮。\n5. 道具与装饰部分\n保留武器、金属装饰、发饰、挂件、毛绒装饰等所有道具的造型、位置、大小、透视关系完全不变。\n可轻微优化其边缘干净度与局部质感，使其更清晰自然，但不要新增细节，不要重画，不要改变结构。\n四、增强人物与环境的自然融合\n在不改变背景、不改变整体氛围的前提下，让人物全身与环境融合得更加自然。\n可适度优化以下方面：\n●人物边缘吸收少量环境色\n●人物局部受光与背景光线更统一\n●人物下方与地面的接触关系更自然\n●人物与背景交界处过渡更柔和\n●人物边缘有轻微空气感，但不发虚\n●人物整体不再像单独抠出来贴在背景上\n如果人物脚下、衣摆、武器或毛绒装饰靠近地面，可以轻微增强接地感与环境接触感，但不能改变人物姿态和构图。\n\n五、重点限制\n人物五官、脸型结构、眼睛形状、视线方向、鼻子、嘴巴、下颌线、人物气质、头部大小、头部位置、头部朝向、头发整体结构、服装轮廓、服装配件、金属装饰、武器、身体动作、肢体比例、背景整体颜色与氛围都必须保持不变。\n不要因为精修全身边缘而连带修改：\n●脸型\n●眉眼\n●鼻口\n●下巴\n●头部位置\n●手部结构\n●腿部形态\n●衣服版型\n●道具位置\n●背景结构\n\n六、画面质感要求\n整体保持真实摄影质感和高级 cos 场照修图质感。\n人物全身细节自然清晰，边缘干净但不过度锐化；不要过度磨皮，不要塑料感，不要明显 AI 重绘感，不要让主体边缘假、硬、糊、脏。最终效果应像专业后期对人物主体进行了完整精修：\n●边缘干净自然\n●全身轮廓完整统一\n●服装与发丝细节更高级\n●道具更利落\n●人物与环境更融合\n●整体真实、克制、自然\n而不是重做一个新人物。\n\n七、负面限制\n不要改脸，不要换脸，不要改变五官，不要改变头部位置；\n不要改变表情，不要改变视线，不要改变人物气质；\n不要改变发型整体结构，不要夸张吹风，不要让头发大幅飞起；\n不要新增大量碎发，不要炸毛，不要凌乱；\n不要让手变形，不要让腿变形，不要改变身体比例；\n不要改变服装结构，不要改变服装花纹，不要改变武器与配饰；\n不要出现新的白边、黑边、锯齿边、发虚边；\n不要改变背景，不要改变色调，不要改变整体氛围；\n不要过度磨皮，不要过度锐化，不要出现明显 AI 修图痕迹；\n不要让人物边缘过硬、过亮、过假，不要让人物像重新生成的人像。", "group": "清理与修复"}, {"id": "one-curated-1", "title": "一键降噪去压缩痕迹", "group": "画质与细节", "prompt": "请基于原图进行画质清理，只去除高感噪点、JPEG块状压缩、色块断层、脏点和轻微涂抹感。保留人物五官、发丝、皮肤纹理、服装纹样、道具结构、原有锐度层级和背景细节，不改变构图、色调、光影、景深与人物身份；暗部保持干净通透但保留自然摄影颗粒，避免过度降噪、塑料感、油画感和AI锐化边缘。"}, {"id": "one-curated-2", "title": "一键去除摩尔纹", "group": "画质与细节", "prompt": "仅清理服装、显示屏或细密纹理区域产生的彩色摩尔纹、波纹和干扰条纹，恢复原本连续自然的布料纹理与颜色。保持人物、服装版型、原始花纹、材质、明暗关系、构图和背景完全不变，不要抹平真实纹理，不要新增图案，不要连带修改面部和肢体。"}, {"id": "one-curated-3", "title": "一键去除衣物污渍", "group": "服装与布料", "prompt": "只去除服装表面的灰尘、污点、明显脏痕和非设计性的局部色斑，依据周围布料自然补全原有颜色、纹理和褶皱。保持服装款式、版型、图案、缝线、材质反光、人物动作、光影与背景不变，修复边界无痕，不要把服装磨平或改成新材质。"}, {"id": "one-curated-4", "title": "一键去除皮肤油光", "group": "面部与妆容", "prompt": "仅减弱额头、鼻梁、脸颊和身体皮肤上过强且不自然的油光与死白反光，保留符合现场光源方向的自然高光、皮肤纹理和立体结构。人物五官、脸型、妆容、肤色、表情、身份与原图完全一致，不要磨皮，不要美白，不要改变光源和整体色调。"}, {"id": "one-curated-5", "title": "一键修复发丝边缘", "group": "假发与发丝", "prompt": "仅修复头发外轮廓处的锯齿、断裂发丝、发虚边缘和轻微抠图痕迹，依据原发型补充少量自然细碎发丝，使头发与背景过渡干净真实。保持脸部、发型整体结构、发色、刘海、头部位置、人物姿势和背景不变，避免白边、黑边、发光边、炸毛和大幅新增头发。"}, {"id": "one-curated-6", "title": "一键肤质精修", "group": "面部与妆容", "prompt": "对人物皮肤进行克制的专业摄影精修：轻微淡化临时痘印、细小瑕疵和不均匀色块，保留毛孔、细小绒毛、皮肤纹理、面部骨骼和原有妆容。严格保持人物身份、五官比例、脸型、表情、肤色、光影和身体结构不变，避免过度磨皮、美白、网红脸、蜡像感和AI重绘感。"}, {"id": "one-curated-7", "title": "一键统一肤色", "group": "面部与妆容", "prompt": "轻微统一人物面部、颈部、手臂和腿部的肤色与明暗，使不同部位在同一环境光下自然协调，同时保留真实血色、皮肤纹理和局部受光差异。不要改变人物身份、妆容、五官、身材、动作、服装和背景，不要整体美白，不要把皮肤处理成单一平面颜色。"}, {"id": "one-curated-8", "title": "一键服装材质增强", "group": "服装与布料", "prompt": "在不改变服装设计的前提下，增强布料、皮革、蕾丝、毛绒和刺绣等原有材质的真实纹理、褶皱层次、缝线与受光表现。严格保留服装版型、颜色、图案、配件、人物姿势和光源方向，不新增装饰，不重画服装，不过度锐化，不改变原角色设定。"}, {"id": "one-curated-9", "title": "一键眼神光增强", "group": "面部与妆容", "prompt": "仅对人物双眼现有的高光和瞳孔通透度做轻微增强，使眼神更清晰有神，并与原场景光源的方向、颜色和亮度一致。保持眼睛形状、瞳色、美瞳纹理、视线方向、五官、表情和妆容完全不变，不放大眼睛，不新增夸张光斑，不产生玻璃眼或AI感。"}, {"id": "one-curated-10", "title": "一键统一人物背景光影", "group": "光影与融合", "prompt": "在不改变人物和背景内容的前提下，统一人物与环境的光源方向、色温、亮度和对比度。让人物边缘自然吸收少量环境色，亮部与暗部符合场景光线，保留原有面部、服装和道具细节；不新增主光源，不改变构图、人物身份、姿势和背景结构，避免人物像单独粘贴在背景上。"}, {"id": "one-curated-11", "title": "一键增强人物接地感", "group": "光影与融合", "prompt": "仅增强人物脚部、衣摆、道具与地面的接触关系：依据原场景光源补充自然接触阴影、轻微环境反射和局部遮挡关系，使人物稳定融入地面。保持人物位置、大小、姿势、地面透视和构图不变，不制造悬浮感，不增加夸张黑影，不改动脚部和服装结构。"}, {"id": "one-curated-12", "title": "一键补充自然轮廓光", "group": "光影与融合", "prompt": "根据背景中真实存在的主光源，仅在人物受光侧的头发、肩部、服装和道具边缘补充克制自然的轮廓光，颜色、方向和强度与环境一致。保留人物五官、动作、服装结构和原有明暗层次，不生成整圈发光描边，不让边缘过曝，不新增不合理光源。"}, {"id": "one-curated-13", "title": "一键自然景深", "group": "光影与融合", "prompt": "依据原画面的镜头距离、人物位置和空间层级，建立自然真实的摄影景深：人物主体保持清晰，前景和远景按距离逐渐柔化，边缘过渡连续。保持构图、透视、人物细节和背景结构不变，不做生硬抠图式模糊，不把同一平面局部错误虚化，不添加旋转焦外。"}, {"id": "one-curated-14", "title": "一键体积雾", "group": "氛围与天气", "prompt": "在场景的地面低处、远景和建筑缝隙中加入少量具有前后层次的自然体积雾，雾气颜色与环境色温一致，并遵循场景透视与遮挡关系。保持人物面部和服装主体清晰，不遮挡关键道具，不改变构图、背景结构和原有光影，避免整张画面发白、雾气贴脸或边缘穿模。"}, {"id": "one-curated-15", "title": "一键体积光", "group": "氛围与天气", "prompt": "根据画面中已有的窗户、灯具或天空光方向，加入少量柔和的体积光束和空气散射，光束应被人物与场景物体自然遮挡，亮度克制并与原色温一致。保持人物、背景、构图和主光方向不变，不新增无来源光柱，不遮挡五官，不造成大面积过曝和廉价舞台灯效果。"}, {"id": "one-curated-16", "title": "一键去除穿帮物", "group": "清理与修复", "prompt": "仅移除画面中非剧情需要的灯架、夹子、胶带、线缆、反光板边角和摄影辅助物，并依据周围环境自然补全被遮挡区域。保持人物、服装、道具、场景结构、透视、纹理和光影不变；修复边界连续无重复纹理，不误删角色设定中的机械零件、饰品或武器结构。"}, {"id": "one-curated-17", "title": "一键清理地面杂物", "group": "清理与修复", "prompt": "只清理人物周围地面上的纸屑、塑料袋、烟头、临时标记、零散垃圾和无关小物，使用相邻地面材质无缝补全。保留地砖接缝、草地纹理、水渍、裂痕、人物接触阴影与道具落影，不改变脚部、鞋子、构图、透视和环境色。"}, {"id": "one-curated-18", "title": "一键去除抠图白边", "group": "清理与修复", "prompt": "仅清除人物、假发、服装和道具外轮廓处的白边、灰边、色边与半透明抠图残留，让边缘颜色自然吸收当前背景环境色。保持轮廓形状、细小发丝、蕾丝孔洞、动作和背景细节不变，不缩小主体，不生成整圈发光描边，不把边缘处理成生硬剪纸。"}, {"id": "one-curated-19", "title": "一键去除传感器脏点", "group": "清理与修复", "prompt": "只去除天空、墙面和均匀背景区域中由镜头或传感器造成的固定灰点、黑点和小块污迹，依据周围颜色与纹理自然修补。不得修改人物痣、妆面装饰、服装图案、星点、火花或剧情粒子，保持构图、色彩、颗粒与全部真实细节不变。"}, {"id": "one-curated-20", "title": "一键修复局部缺损", "group": "清理与修复", "prompt": "修复由遮挡、抠图或生成错误造成的局部断边、透明破洞和不连续区域，严格沿用相邻位置的原有结构、颜色、材质、纹理和受光方向。只处理指定缺损，不改人物身份、姿势、服装设计和道具造型，不凭空添加新结构，不在修复区留下重复纹理或涂抹痕迹。"}, {"id": "one-curated-21", "title": "一键局部锐度恢复", "group": "画质与细节", "prompt": "仅恢复指定主体区域因缩放或轻微失焦丢失的边缘与中频细节，使眼睛、发丝、纹样和道具刻线清晰但不过锐。保持原始分辨率比例、景深层级、皮肤纹理和摄影颗粒，不改变五官与文字，不制造双边、白色锐化光晕、假细节或蜂窝噪点。"}, {"id": "one-curated-22", "title": "一键轻微运动模糊修复", "group": "画质与细节", "prompt": "只减弱人物面部、服装标志或关键道具上轻微的手抖与运动拖影，依据真实轮廓恢复可辨识细节，同时保留动作方向所需的自然动态感。不得改变人物姿势、五官、手指数量和道具结构，不对背景景深强行锐化，不生成重复轮廓或过度清晰的AI纹理。"}, {"id": "one-curated-23", "title": "一键暗部细节恢复", "group": "画质与细节", "prompt": "仅在欠曝暗部中温和恢复服装褶皱、头发层次、道具纹理和环境结构，维持原场景的低调氛围与黑位深度。保持主光方向、对比度关系、人物身份和颜色不变，不把夜景提成灰雾，不抬亮本应纯黑的区域，不引入彩色噪点、色块和HDR光晕。"}, {"id": "one-curated-24", "title": "一键过曝高光修复", "group": "画质与细节", "prompt": "仅压回脸部、皮肤、白色服装、金属和灯光附近失去层次的过曝高光，参考邻近区域恢复合理颜色与材质纹理。保留高光方向和光源强度关系，不压暗整张画面，不改变肤色与服装颜色，不在纯光源中心伪造细节，不产生脏灰色高光。"}, {"id": "one-curated-25", "title": "一键修复色带断层", "group": "画质与细节", "prompt": "只修复天空、烟雾、光晕和渐变背景中的明显色带、阶梯断层与块状过渡，使颜色连续细腻，并加入极轻微且均匀的自然颗粒防止再次断层。保持人物、边缘、原色调、亮度范围和特效形状不变，不涂抹细节，不改变已有光束和云层结构。"}, {"id": "one-curated-26", "title": "一键底妆净化", "group": "面部与妆容", "prompt": "对人物底妆进行克制清理：淡化卡粉、浮粉、局部斑驳和不自然色块，保留毛孔、绒毛、面部骨骼、腮红、修容与真实肤质。严格锁定人物身份、脸型、五官比例、表情和肤色，不磨成塑料皮肤，不美白，不改变原角色妆容风格。"}, {"id": "one-curated-27", "title": "一键眼线精修", "group": "面部与妆容", "prompt": "仅修复眼线边缘的断裂、晕染和局部锯齿，使左右眼线在原有设计基础上干净连贯，同时保留角色妆容的粗细、走向与特色。保持眼型、眼距、瞳孔、视线、睫毛、表情和人物身份完全不变，不擅自做对称化，不放大眼睛。"}, {"id": "one-curated-28", "title": "一键睫毛修复", "group": "面部与妆容", "prompt": "只整理结块、断裂或被抠图破坏的睫毛，沿原睫毛生长方向补充少量清晰自然的单根睫毛，并匹配当前焦平面和光线。保持眼型、眼妆、瞳孔、美瞳、视线与五官不变，不生成浓密假睫毛墙，不让睫毛穿入眼球或超出合理长度。"}, {"id": "one-curated-29", "title": "一键唇妆修复", "group": "面部与妆容", "prompt": "仅修复口红边界不齐、轻微脱色、溢色和局部反光不均，延续原唇色、质感与唇纹，使唇妆干净但真实。保持嘴型、唇厚、牙齿、表情、面部比例和人物身份不变，不改变妆容色系，不做丰唇，不抹掉自然唇纹。"}, {"id": "one-curated-30", "title": "一键眉形清晰", "group": "面部与妆容", "prompt": "只清理眉毛边缘的杂乱晕染并补足少量断开的眉毛纹理，遵循原眉形、眉色和毛发生长方向。保持额头、眼睛、五官、表情与妆容不变，不重新设计眉形，不强制左右完全对称，不生成生硬色块或过度锋利的边缘。"}, {"id": "one-curated-31", "title": "一键牙齿自然清洁", "group": "面部与妆容", "prompt": "仅减弱牙齿表面的明显色渍并恢复自然清洁度，保留牙齿原有形状、排列、缝隙、阴影和口腔环境色。不得改变嘴型、笑容、唇妆、脸型和人物身份，不做纯白发光牙，不重排牙齿，不增加或减少牙齿数量。"}, {"id": "one-curated-32", "title": "一键隐藏假发网", "group": "假发与发丝", "prompt": "仅遮盖发际线、耳侧或分缝处露出的假发网、胶痕和固定夹，使用周围真实发丝与肤色自然补全。保持原发型轮廓、刘海、发色、头饰、耳朵、脸型和头部位置不变，不压低发际线，不大面积重画头发，不产生糊边。"}, {"id": "one-curated-33", "title": "一键自然发际线", "group": "假发与发丝", "prompt": "在不改变额头比例的前提下，柔化过硬的假发发际线，沿原边界补充少量粗细不同、方向自然的碎发，使皮肤与头发过渡真实。保持脸型、五官、发型结构、发色和妆容不变，不明显前移或后移发际线，不制造整齐锯齿和浓黑描边。"}, {"id": "one-curated-34", "title": "一键整理刘海分缝", "group": "假发与发丝", "prompt": "只整理刘海中不自然的空洞、粘连和凌乱分缝，依据原发流轻微调整发束间距与层次，保留空气感和少量自然碎发。保持眉眼、额头、脸型、头饰、发色和整体发型不变，不新增厚重刘海，不遮挡原本露出的五官。"}, {"id": "one-curated-35", "title": "一键去除假发塑料感", "group": "假发与发丝", "prompt": "降低假发表面成片的塑料反光和过饱和色块，恢复细密发丝、明暗层次与符合现场光源的柔和高光，让材质更接近真实头发。保持发色、发型、卷度、长度、头饰和背景不变，不把彩色假发改成自然黑发，不抹平发束。"}, {"id": "one-curated-36", "title": "一键增强发尾层次", "group": "假发与发丝", "prompt": "仅在原有发尾范围内恢复被压成一片的发束层次，补充少量方向一致、粗细自然的末端发丝，并匹配景深与运动状态。保持头发长度、发型轮廓、发色、人物动作和背景不变，不凭空延长头发，不制造大量炸毛和透明断边。"}, {"id": "one-curated-37", "title": "一键统一头发风向", "group": "假发与发丝", "prompt": "根据裙摆、披风和现场已有风向，轻微统一长发与碎发的飘动方向，使发束受力连续、前后层次合理并保留自然重量。保持头部、脸部、整体发型、发长、发色和人物姿势不变，不让头发穿过脸、身体或道具，不生成夸张飓风效果。"}, {"id": "one-curated-38", "title": "一键整理服装褶皱", "group": "服装与布料", "prompt": "只减弱运输或穿着造成的杂乱死褶、夹痕和局部鼓包，保留符合人物动作、关节弯曲和布料重量的必要褶皱。保持服装版型、尺寸、图案、缝线、材质、身体轮廓和姿势不变，不把衣服熨成平面，不改变角色设定。"}, {"id": "one-curated-39", "title": "一键恢复服装纹样", "group": "服装与布料", "prompt": "仅补全因遮挡、折叠或生成错误而中断的原有花纹、印花、滚边和刺绣，使图案沿布料曲面、透视和褶皱自然延续。保持颜色、设计、位置、人物动作和光影不变，不创造新图案，不复制粘贴出机械重复，不把文字改错。"}, {"id": "one-curated-40", "title": "一键修复缝线毛边", "group": "服装与布料", "prompt": "只修复服装缝线、包边和接缝处的断线、锯齿与不自然毛边，恢复与原材质一致的针脚尺度和走向。保持衣服版型、图案、褶皱、身体轮廓和受光不变，不删除设计性流苏，不增加多余接缝，不过度锐化。"}, {"id": "one-curated-41", "title": "一键增强蕾丝通透感", "group": "服装与布料", "prompt": "仅优化蕾丝、薄纱和网眼布料的孔洞结构、透明度与边缘细节，使其能自然透出后方皮肤或环境，并遵循当前景深。保持服装覆盖范围、花纹、颜色、人物身体和姿势不变，不扩大透明区域，不改变衣着尺度，不产生错误穿透。"}, {"id": "one-curated-42", "title": "一键修复铠甲边缘", "group": "服装与布料", "prompt": "只修复铠甲、护肩和硬质服装部件的缺口、锯齿、弯曲错位与穿模，沿用原有结构、厚度、纹饰和金属受光。保持角色比例、动作、服装设计、关节活动空间与背景不变，不增加新部件，不改变武器，不把铠甲磨成塑料。"}, {"id": "one-curated-43", "title": "一键去除服装环境溢色", "group": "服装与布料", "prompt": "仅减弱服装阴影和边缘中过强、不均匀的舞台灯或背景溢色，同时保留符合现场光源的自然环境反射。保持服装本色、材质、图案、明暗塑形、人物肤色和背景色调不变，不把彩色光全部去除，不产生灰白边缘。"}, {"id": "one-curated-44", "title": "一键修复手指结构", "group": "体态与肢体", "prompt": "仅修复指定手部中明显的手指数目错误、粘连、断裂、畸形关节和不自然指向，参考另一只手与真实解剖恢复合理结构。保持手势含义、手部位置、人物动作、武器握法、服装袖口、光影和身份不变，不改变未选区域，不让手变大或变小。"}, {"id": "one-curated-45", "title": "一键修复肢体边缘", "group": "体态与肢体", "prompt": "只修复手臂、腿部和躯干轮廓处因抠图或生成造成的凹陷、凸起、断边和局部穿模，依据原姿势恢复连续自然的解剖边缘。保持身材比例、动作、服装覆盖、肌肉结构、人物身份和背景不变，不瘦身，不增肌，不重塑身体。"}, {"id": "one-curated-46", "title": "一键优化肩颈线条", "group": "体态与肢体", "prompt": "仅缓解服装挤压或抠图造成的肩颈边缘僵硬、断裂与不自然折角，使颈部、锁骨和肩部在原姿势下连接自然。保持头部位置、脸型、身材、动作、服装领口和人物身份不变，不拉长脖子，不削肩，不改变骨架比例。"}, {"id": "one-curated-47", "title": "一键修复手持道具接触", "group": "体态与肢体", "prompt": "只优化手指与武器、法杖或小道具的接触关系，使握持点、遮挡顺序、接触阴影和受力方向真实合理。保持原手势、手指数量、道具位置、尺寸、造型、人物动作与构图不变，不让道具穿过手掌，不重新设计握法。"}, {"id": "one-curated-48", "title": "一键修复脚部与鞋底", "group": "体态与肢体", "prompt": "仅修复脚踝、鞋面、鞋跟和鞋底处的断裂、穿模、悬空与不合理变形，使鞋子结构完整并与地面产生自然接触。保持腿部长度、站姿、鞋款设计、人物位置、地面透视和阴影方向不变，不改变身高，不移动人物。"}, {"id": "one-curated-49", "title": "一键增强武器金属质感", "group": "道具与材质", "prompt": "在不改变武器造型的前提下，增强金属表面的粗糙度差异、边缘高光、细微划痕和环境反射，使材质真实且符合现有光源。严格保留武器长度、厚度、纹饰、颜色、握持位置和人物动作，不增加刀刃、不改结构、不产生镜面塑料感。"}, {"id": "one-curated-50", "title": "一键增强宝石通透感", "group": "道具与材质", "prompt": "仅增强现有宝石或水晶的内部折射、边缘高光、颜色层次与少量内含物，使其通透但保留真实厚度。保持宝石形状、镶嵌位置、尺寸、主色和道具结构不变，不把普通饰品全部变成宝石，不生成无来源强光或过曝白芯。"}, {"id": "one-curated-51", "title": "一键增强皮革质感", "group": "道具与材质", "prompt": "只增强皮革服饰或道具表面的细密纹理、压痕、缝线、边缘磨损和柔和反光，遵循原有受力褶皱与光源方向。保持颜色、版型、图案、人物动作和背景不变，不改成乳胶或金属，不增加大面积破损，不过度锐化。"}, {"id": "one-curated-52", "title": "一键增强木质纹理", "group": "道具与材质", "prompt": "仅恢复木质武器、箱体或场景部件的自然木纹、纤维、磨损和哑光反射，使纹理沿物体结构与透视连续。保持物体形状、颜色、雕刻、尺寸、位置和光影不变，不把木材改成石头或金属，不出现重复贴图。"}, {"id": "one-curated-53", "title": "一键增强玻璃透明材质", "group": "道具与材质", "prompt": "只优化玻璃、透明塑料或镜片的边缘厚度、折射、反射与透射关系，使后方内容可见且变形符合曲面。保持物体轮廓、颜色、位置、人物五官和场景不变，不把透明区域挖空，不制造双重人脸，不增加无来源高光。"}, {"id": "one-curated-54", "title": "一键修复道具破损", "group": "道具与材质", "prompt": "修复运输造成的道具裂口、掉漆、断裂连接和明显胶痕，依据左右结构与现有设计补全材质、纹饰和受光。保持道具造型、尺寸、颜色、使用痕迹、人物握持和构图不变；保留角色设定中的战损效果，不擅自翻新或添加部件。"}, {"id": "one-curated-55", "title": "一键统一阴影方向", "group": "光影与融合", "prompt": "依据画面中最明确的主光源，只校正人物、道具和地面上方向冲突的局部阴影，使投影方向、软硬度、色温和距离衰减一致。保持物体位置、人物动作、场景结构和整体曝光不变，不新增第二主光，不制造纯黑剪影或错误双影。"}, {"id": "one-curated-56", "title": "一键自然环境反射", "group": "光影与融合", "prompt": "仅在金属、皮革、湿地面和光滑道具上补充来自周围环境的克制反射，反射颜色、方向、模糊度与材质粗糙度匹配。保持物体本色、结构、人物和背景不变，不生成镜面复制人物，不在哑光区域添加强反光，不改变主光。"}, {"id": "one-curated-57", "title": "一键修复背景色污染", "group": "光影与融合", "prompt": "只减弱人物边缘、皮肤和服装上由抠图残留造成的异常绿色、蓝色或品红色污染，同时保留真实存在的环境反射光。保持原肤色、服装颜色、轮廓、光影和背景色调不变，不将边缘去色成灰色，不制造白边或黑边。"}, {"id": "one-curated-58", "title": "一键平衡面部受光", "group": "光影与融合", "prompt": "在不改变光源方向的前提下，轻微平衡面部局部过暗与过亮区域，使双眼、鼻梁、唇部和下颌保留清晰层次且仍符合场景氛围。保持五官、脸型、肤色、妆容、表情和人物身份不变，不做棚拍式平光，不消除角色感阴影。"}, {"id": "one-curated-59", "title": "一键增强逆光层次", "group": "光影与融合", "prompt": "针对已有逆光场景，恢复人物暗部可辨识细节，并在受光边缘保留自然高光、空气散射和亮度衰减，使主体与背景融合。保持逆光方向、剪影氛围、人物身份、服装和构图不变，不把背景压黑，不生成整圈发光线，不让脸部假亮。"}, {"id": "one-curated-60", "title": "一键横向扩图", "group": "场景与构图", "prompt": "在画面左右两侧自然延展现有场景，连续补全建筑、地面、天空、植被与光影，保持地平线、消失点、镜头高度、景深和材质尺度一致。原图中心人物、姿势、大小、位置、服装、道具和已存在背景完全不变，不复制人物，不重复明显物体。"}, {"id": "one-curated-61", "title": "一键纵向扩图", "group": "场景与构图", "prompt": "向画面上方或下方自然延展天空、建筑顶部、地面和前景，保持原有镜头视角、垂直线、地平线、景深与光源连续。锁定人物全身比例、位置、动作、服装和道具，不拉伸原图，不新增肢体，不在扩展区生成重复角色。"}, {"id": "one-curated-62", "title": "一键校正背景透视", "group": "场景与构图", "prompt": "仅校正背景建筑、墙面和地面中明显冲突的垂直线、水平线与消失点，使空间透视与人物拍摄视角一致。保持人物、道具、原构图范围、镜头高度和建筑设计不变，不强行拉直广角应有的透视，不改变主体比例。"}, {"id": "one-curated-63", "title": "一键延续建筑结构", "group": "场景与构图", "prompt": "补全被裁切或局部生成中断的梁柱、门窗、屋檐、墙体和钢架，使重复间距、承重逻辑、材质、透视与受光连续。保持人物、现有建筑风格、地平线、构图和背景氛围不变，不混入其他建筑年代，不生成弯曲门窗和错误连接。"}, {"id": "one-curated-64", "title": "一键修复地面连续性", "group": "场景与构图", "prompt": "仅修复人物周围地砖、木板、草地、雪地或水面的断层、重复贴图和错误拼接，使纹理沿透视缩放并自然延伸。保留脚部接触、道具阴影、积水反射、真实裂纹和地面起伏，不移动人物，不抹平所有细节。"}, {"id": "one-curated-65", "title": "一键增强场景前后层次", "group": "场景与构图", "prompt": "依据现有构图强化前景、中景和远景的尺度、遮挡、空气透视与清晰度递减，让空间更有纵深但不改变场景内容。人物保持主焦点，位置、比例、姿势、背景结构和光源不变，不添加突兀前景遮挡，不使用生硬局部模糊。"}, {"id": "one-curated-66", "title": "一键空气灰尘粒子", "group": "氛围与天气", "prompt": "在逆光或暗背景区域加入少量大小不一、远近分层的空气灰尘粒子，密度随景深变化并被人物自然遮挡。保持五官、服装、道具和背景清晰，不在全画面均匀撒点，不把粒子做成雪花或星星，不新增无来源强光。"}, {"id": "one-curated-67", "title": "一键雨后湿地效果", "group": "氛围与天气", "prompt": "仅让现有地面呈现雨后微湿状态，增加符合材质的局部深色、水膜反射和少量浅水洼，并匹配场景光源与透视。保持人物、鞋底、建筑、构图和原色调不变，不让室内无故积水，不生成镜面复制，不淹没地面纹理。"}, {"id": "one-curated-68", "title": "一键自然风感", "group": "氛围与天气", "prompt": "根据画面中已有风向，轻微协调头发、衣摆、披风、落叶和烟雾的受风方向与速度，保留材质重量和前后层次。保持人物姿势、服装结构、道具位置、构图和面部不变，不制造暴风效果，不让软质元素穿过身体或背景物体。"}, {"id": "one-curated-69", "title": "一键真实火焰特效", "group": "特效与能量", "prompt": "在指定区域生成具有内焰、外焰、火星、热扰动和轻微烟雾的真实火焰，颜色与亮度符合燃烧强度，并对邻近人物、道具和地面产生合理暖色照明。保持人物五官、姿势、服装和构图不变，火焰不遮挡关键主体，不出现贴纸边缘。"}, {"id": "one-curated-70", "title": "一键真实闪电特效", "group": "特效与能量", "prompt": "在指定起点与终点之间生成分叉自然、粗细变化合理的电弧闪电，加入少量空气辉光和对周围材质的蓝白色反射。保持人物、武器、场景结构和主构图不变，闪电遵循遮挡关系，不穿过身体，不形成规则树枝或大面积过曝。"}, {"id": "one-curated-71", "title": "一键魔法能量粒子", "group": "特效与能量", "prompt": "围绕指定手部、法杖或角色区域生成疏密有序、远近分层的魔法能量粒子与细小光丝，主色匹配角色设定，并对邻近表面产生轻微同色反光。保持人物身份、手势、服装、道具和背景不变，不遮挡面部，不全屏铺满粒子。"}, {"id": "one-curated-72", "title": "一键刀光运动轨迹", "group": "特效与能量", "prompt": "沿武器当前挥动方向添加具有起止点、速度衰减和透明层次的刀光轨迹，弧线与手臂动作、镜头透视及武器长度一致。保持武器结构、人物姿势、手指和构图不变，轨迹不穿过身体，不改变刀的位置，不生成多余武器。"}, {"id": "one-curated-73", "title": "一键冲击碎屑特效", "group": "特效与能量", "prompt": "在指定受力点添加向外扩散的碎石、尘雾和细小冲击波，颗粒大小、飞行方向、动感模糊与地面材质和冲击方向一致。保持人物、道具、建筑主体和构图不变，碎屑不遮挡脸部，不均匀铺满画面，不破坏未指定区域。"}, {"id": "one-curated-74", "title": "一键冰霜水花特效", "group": "特效与能量", "prompt": "在指定道具、地面或动作轨迹上生成通透的冰晶、霜雾或水花，形态符合温度、重力、运动方向和材质接触关系，并反射环境颜色。保持人物、服装、道具结构和背景不变，不覆盖五官，不把全画面冻结，不产生塑料水滴与错误穿模。"}, {"id": "one-curated-75", "title": "一键校正白平衡", "group": "色彩与成片", "prompt": "依据画面中的中性色、肤色和主要光源，温和校正整体偏黄、偏蓝、偏绿或偏品红，使色温自然且保留场景应有的氛围色。保持人物肤色个性、服装本色、光源颜色和明暗关系不变，不做完全中性化，不改变局部特效色。"}, {"id": "one-curated-76", "title": "一键电影感色彩分离", "group": "色彩与成片", "prompt": "在保留原片基调的基础上，轻微建立高光与阴影的冷暖或互补色分离，统一人物、服装和背景的色彩关系并保留肤色自然。保持曝光、细节、角色设定色和光源逻辑不变，不套重口滤镜，不出现青橙溢色、断层和脏灰肤色。"}, {"id": "one-curated-77", "title": "一键保护肤色调色", "group": "色彩与成片", "prompt": "在整体风格化调色后，仅修正人物皮肤中过度偏绿、偏灰、偏紫或过饱和的区域，使面部、颈部和四肢在环境光下自然统一。保持妆容、角色特殊肤色、五官、光影和背景色调不变，不美白，不将肤色处理成单一颜色。"}, {"id": "one-curated-78", "title": "一键优化黑位与高光滚降", "group": "色彩与成片", "prompt": "轻微整理画面的黑位、白位和高光滚降，使暗部有深度但不死黑，高光明亮但不过曝，并保留中间调层次。保持原曝光意图、人物肤色、特效亮度和场景氛围不变，不制造HDR光晕，不压扁对比度，不剪切颜色。"}, {"id": "one-curated-79", "title": "一键统一颗粒与输出锐化", "group": "色彩与成片", "prompt": "根据最终输出尺寸，为人物与背景加入一致、细腻且克制的摄影颗粒，并进行只针对边缘和纹理的轻量输出锐化。保持皮肤自然、景深层级、色彩和构图不变，不把噪点铺满暗部，不产生白边、锯齿、蜂窝纹或过度数码感。"}], "half": [{"id": "half-1", "step": 1, "title": "去背景杂物+扩展比例", "tool": "Banana", "prompt": "请以我上传的原图为基础，对这张 cos 场照进行高质量清理与背景修复。整体目标是：只清除画面中的拍摄杂物和无关人物，保留原本大型室内场馆的真实空间感，让背景变成干净、完整的场馆环境。\n\n一、人物主体必须完全不变：\n强行锁定画面中央 cos 人物在原图中的大小、占比、位置、坐姿、抬腿动作、身体朝向、头部角度、手部动作、腿部姿态、面部五官、表情、眼神、白色长发、发型、发丝方向、服装造型、黑白橙配色、鞋子、手套、配饰、皮肤质感、人物受光方向、人物清晰度和边缘轮廓。\n不能改脸，不能换脸，不能改变人物身份，不能改变人物姿态，不能放大或缩小人物，不能移动人物，不能重绘人物服装，不能改变人物原本的真实 cos 场照质感。\n\n二、需要清除的内容：\n清除画面中所有与拍摄现场有关的杂物，包括但不限于：\n所有巨大的柔光罩、所有长条柔光灯、所有灯架、支架、三脚架、黑色遮光布、补光设备、摄影器材、地面杂物、线缆、水瓶、背景中的路人、工作人员、其他 coser、远处坐着的人、右侧梯子上的人物、画面中所有无关人影和杂乱物体。\n清理后不要留下明显擦除痕迹，不要出现模糊补丁，不要出现扭曲的墙面、断裂的钢架、残缺的人形或奇怪阴影。\n\n三、背景修复要求：\n保留原图原本的大型室内场馆结构，包括顶部大面积钢架、屋顶桁架、深色天花结构、远处背景墙、场馆的纵深关系和整体空间透视。\n被清除杂物遮挡的位置，需要根据周围环境自然补全为干净的场馆背景：补全连续的顶部钢架结构、远处墙面。\n整体背景要真实、干净、自然，像原本就是一个空旷整洁的会展场馆，而不是重新生成一个完全不同的场景。\n四、光影与色调：\n保持原图原本的色调和真实场馆光线。\n清除灯具后，不要让画面突然变亮，也不要新增夸张光源。\n人物原本的受光方向和亮度必须保持一致，背景修复后的明暗关系要自然融入原图。\n整体画面应该更干净、更高级，但仍然像真实拍摄的 cos 场照。\n五、画面效果：\n最终画面只保留中央人物、人物坐着的椅子/梯子结构以及干净的大型室内场馆背景。\n背景干净但不能空得假，要保留真实场馆的建筑结构、空间层次、暗部细节和轻微环境噪点。\n画面风格保持真实摄影质感、电影感、冷色调、高级干净的场照成片效果。\n最后补全空白区域。\n负面要求：\n不要改变人物，不要改脸，不要换脸，不要改变姿势，不要改变服装，不要改变人物大小和占比，不要移动人物，不要裁切画面，不要改变原图构图，不要新增奇怪建筑，不要生成新人物，不要保留路人，不要保留摄影灯，不要保留柔光罩，不要保留灯架，不要保留三脚架，不要保留线缆杂物，不要出现 AI 修复痕迹，不要出现扭曲钢架，不要出现破碎墙面，不要出现残影，不要过度磨皮，不要过度锐化，不要变成插画风，不要变成纯二次元风。"}, {"id": "half-2", "step": 2, "title": "根       ];
      modalAnimation = dialog.animate(frames, { duration:opening?560:430, easing:opening?"cubic-bezier(.16,1,.3,1)":"cubic-bezier(.55,0,1,.45)", fill:"both" });
      return modalAnimation.finished.catch(() => {}).finally(() => { modalAnimation = null; });
    }
    function animateBackground(opening) {
      backgroundAnimations.forEach(animation => animation.cancel());
      const elements = [...document.querySelectorAll(".sidebar, .main")];
      if (!elements.length || !elements[0].animate || window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        backgroundAnimations = [];
        return Promise.resolve();
      }
      const frames = opening ? [
        { filter:"blur(0px) brightness(1) saturate(1)" },
        { filter:"blur(6px) brightness(.74) saturate(.9)" }
      ] : [
        { filter:"blur(6px) brightness(.74) saturate(.9)" },
        { filter:"blur(0px) brightness(1) saturate(1)" }
      ];
      const duration = opening ? 540 : 430;
      const animations = elements.map(element => element.animate(frames, { duration, easing:opening?"cubic-bezier(.16,1,.3,1)":"cubic-bezier(.4,0,.2,1)", fill:"both" }));
      backgroundAnimations = animations;
      return Promise.all(animations.map(animation => animation.finished.catch(() => {}))).finally(() => {
        animations.forEach(animation => animation.cancel());
        if (backgroundAnimations === animations) backgroundAnimations = [];
      });
    }
    function openPrompt(id, trigger, options={}) {
      const item = byId[id];
      const modal = document.getElementById("promptModal");
      if (!item || !modal || modalClosing) return;
      modalReturnFocus = trigger || document.activeElement;
      document.getElementById("modalTag").textContent = item.group || sectionMeta[item.section]?.name || "提示词";
      document.getElementById("modalTitle").textContent = item.title;
      document.getElementById("modalPrompt").textContent = item.prompt;
      document.getElementById("modalCopy").dataset.copyId = item.id;
      modal.classList.remove("closing");
      modal.classList.add("motion-active");
      void modal.offsetWidth;
      modal.classList.add("show");
      modal.setAttribute("aria-hidden", "false");
      document.body.classList.add("modal-open", "modal-visible");
      if (!options.fromHistory) history.pushState({xiaoluo:true, section:currentSection, modal:id}, "");
      animatePrompt(true);
      animateBackground(true);
      requestAnimationFrame(() => modal.querySelector(".modal-close").focus());
    }
    async function closePrompt(options={}) {
      const modal = document.getElementById("promptModal");
      if (!modal.classList.contains("show") || modalClosing) return;
      modalClosing = true;
      modal.classList.add("closing", "motion-active");
      const backgroundMotion = animateBackground(false);
      document.body.classList.remove("modal-visible");
      await Promise.all([animatePrompt(false), backgroundMotion]);
      modal.classList.remove("show");
      modal.classList.remove("closing", "motion-active");
      modal.setAttribute("aria-hidden", "true");
      document.body.classList.remove("modal-open", "modal-visible");
      if (modalReturnFocus && document.contains(modalReturnFocus)) modalReturnFocus.focus();
      modalReturnFocus = null;
      modalClosing = false;
    }
    function requestClosePrompt() {
      if (history.state?.modal) history.back();
      else closePrompt({fromHistory:true});
    }
    function navigateSection(section) {
      const target = section === "search" ? "overview" : section;
      currentSection = target;
      document.getElementById("search").value = "";
      const state = {xiaoluo:true, section:target};
      if (history.state?.xiaoluo && history.state.section !== "overview") history.replaceState(state, "");
      else history.pushState(state, "");
      render(target);
      document.body.classList.remove("menu-open");
    }
    function card(item, options={}) {
      const tag = options.tag || item.group || item.tool || item.kind || sectionMeta[item.section]?.name || "提示词";
      const prompt = escapeHTML(item.prompt);
      const long = item.prompt.length > 180;
      const hasQR = Boolean(item.qr);
      return `<article class="prompt-card ${options.className || ""}" data-card-id="${item.id}">
        <div class="card-top">
          <div style="min-width:0;flex:1"><span class="tag">${escapeHTML(tag)}</span><h3 class="card-title" style="margin-top:10px">${escapeHTML(item.title)}</h3></div>
          ${hasQR ? "" : `<button class="copy-btn" title="复制提示词" data-copy-id="${item.id}">${ICON_COPY}</button>`}
        </div>
        ${hasQR ? qrContent(item) : `<p class="prompt-text ${long ? "clamp" : ""}">${prompt}</p>${long ? `<button class="expand-btn" data-expand>展开全文 ↓</button>` : ""}`}
      </article>`;
    }
    function qrContent(item) {
      return `<div class="qr-block"><img src="${item.qr}" alt="${escapeHTML(item.title)}腾讯文档二维码" loading="lazy"><span class="qr-caption">扫描二维码查看腾讯文档</span></div>`;
    }
    function compactOneClickCard(item) {
      return `<article class="prompt-card one-click-card" data-card-id="${item.id}" data-open-id="${item.id}" role="button" tabindex="0" aria-label="查看${escapeHTML(item.title)}的完整提示词"><h3 class="card-title">${escapeHTML(item.title)}</h3><span class="card-open-hint">查看</span><button class="copy-btn" title="复制完整提示词" data-copy-id="${item.id}" aria-label="复制${escapeHTML(item.title)}">${ICON_COPY}</button></article>`;
    }
    function formulaMenuCard(item) {
      const parts = item.title.split("·").map(part => part.trim());
      const title = parts.shift() || item.title;
      const subtitle = parts.join(" · ") || "点击查看完整提示词";
      return `<article class="prompt-card formula-menu-card" data-card-id="${item.id}" data-open-id="${item.id}" role="button" tabindex="0" aria-label="查看${escapeHTML(item.title)}的完整提示词"><div class="formula-menu-top"><span class="formula-menu-index">${escapeHTML(item.index)}</span><span class="formula-menu-action">查看内容 ↗</span></div><h3>${escapeHTML(title)}</h3><p>${escapeHTML(subtitle)}</p><button class="copy-btn" title="复制完整提示词" data-copy-id="${item.id}" aria-label="复制${escapeHTML(item.title)}">${ICON_COPY}</button></article>`;
    }
    function workflowMenuCard(item, options={}) {
      const parts = item.title.split("·").map(part => part.trim());
      const title = parts.shift() || item.title;
      const subtitle = parts.join(" · ");
      return `<article class="prompt-card workflow-menu-card" data-card-id="${item.id}" data-open-id="${item.id}" role="button" tabindex="0" aria-label="查看第${item.step}步${escapeHTML(item.title)}"><div class="workflow-menu-top"><span class="workflow-menu-index">STEP ${String(item.step).padStart(2,"0")}</span><span class="workflow-menu-tool">${escapeHTML(item.tool || "AI")}</span></div><h3>${escapeHTML(title)}</h3>${subtitle?`<p>${escapeHTML(subtitle)}</p>`:""}<span class="workflow-view-hint">点击查看本步骤提示词</span><button class="copy-btn" title="复制本步骤提示词" data-copy-id="${item.id}" aria-label="复制${escapeHTML(item.title)}">${ICON_COPY}</button>${options.connector?'<span class="flow-arrow" aria-hidden="true"><i></i></span>':""}</article>`;
    }
    function branchMenuCard(item) {
      return `<article class="prompt-card branch-menu-card" data-card-id="${item.id}" data-open-id="${item.id}" role="button" tabindex="0" aria-label="查看${escapeHTML(item.variant)}分支提示词"><div class="workflow-menu-top"><span class="workflow-menu-index">STEP 01</span><span class="workflow-menu-tool">${escapeHTML(item.tool || "AI")}</span></div><h3>${escapeHTML(item.variant)}</h3><p class="branch-view-hint">点击查看本步骤提示词</p><button class="copy-btn" title="复制分支提示词" data-copy-id="${item.id}" aria-label="复制${escapeHTML(item.variant)}分支提示词">${ICON_COPY}</button></article>`;
    }
    function sectionHeader(kicker, title, description, copySection) {
      return `<div class="section-head"><div><p class="eyebrow">${kicker}</p><h2>${title}</h2>${description?`<p>${description}</p>`:""}</div>
        <div class="section-tools"><button class="button" data-collapse>收起长文</button>${copySection ? `<button class="button primary" data-copy-section="${copySection}">复制本组全部</button>` : ""}</div></div>`;
    }
    function overview() {
      const counts = DATA.formula.length + DATA.oneClick.length + DATA.half.length + DATA.full.length + DATA.examples.length;
      return `<section class="overview-screen">
        <div class="hero-compact">
          <div class="hero-copy"><p class="eyebrow">XIAOLUO · PROMPT COLLECTION</p><h1 class="hero-title">小洛整理场照后期提示词合集</h1><p class="hero-sub">五个核心分支，快速查找、查看和复制需要的场照后期提示词。</p></div>
          <div class="stats"><div class="stat"><strong>${counts}</strong><span>内容节点</span></div><div class="stat"><strong>05</strong><span>核心分支</span></div><div class="stat"><strong>04–05</strong><span>工作流步骤</span></div><div class="stat"><strong>100%</strong><span>离线可用</span></div></div>
        </div>
        <div class="mindmap">
          <div class="map-kicker">Interactive Mind Map · 点击节点展开</div>
          <svg class="connections" viewBox="0 0 1200 610" preserveAspectRatio="none" aria-hidden="true">
            <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#e5bd72"/><stop offset="1" stop-color="#a790ff"/></linearGradient></defs>
            <path d="M515 272 C430 250 360 175 260 155" stroke="#e5bd72"/>
            <path d="M507 325 C405 350 350 420 245 430" stroke="#a790ff"/>
            <path d="M692 268 C790 235 820 160 940 145" stroke="#65d6c5"/>
            <path d="M695 330 C790 355 845 405 960 415" stroke="#ee9270"/>
            <path d="M600 385 C600 430 600 470 600 510" stroke="#e184ae"/>
          </svg>
          <div class="map-root"><div><span>Core Collection</span><strong>场照后期<br>提示词</strong><small>Prompt Map</small></div></div>
          <button class="map-node formula" data-section-jump="formula"><div class="node-top"><span class="node-index">01</span><span class="node-count">4 PARTS</span></div><strong>万能提示词公式</strong><p>前缀 × 主体 × 限定 × 质感后缀</p></button>
          <button class="map-node oneClick" data-section-jump="oneClick"><div class="node-top"><span class="node-index">02</span><span class="node-count">${DATA.oneClick.length} ITEMS</span></div><strong>一键精修提示词</strong><p>12 类 COS 后期专业指令库</p></button>
          <button class="map-node half" data-section-jump="half"><div class="node-top"><span class="node-index">03</span><span class="node-count">${DATA.half.length} STEPS</span></div><strong>半合成工作流</strong><p>保留场馆骨架，逐层丰富画面</p></button>
          <button class="map-node full" data-section-jump="full"><div class="node-top"><span class="node-index">04</span><span class="node-count">5 STEPS</span></div><strong>全合成工作流</strong><p>从构思、生成到最终精修</p></button>
          <button class="map-node examples" data-section-jump="examples"><div class="node-top"><span class="node-index">05</span><span class="node-count">${DATA.examples.length} CASES</span></div><strong>使用示例图库</strong><p>原表样片与完整提示词对照</p></button>
        </div>
        <div class="route-strip"><b>推荐路径</b><span>先用万能公式搭骨架</span><span class="route-arrow">→</span><span>选择半合成 / 全合成</span><span class="route-arrow">→</span><span>叠加一键精修</span><span class="route-arrow">→</span><span>参考案例校准质感</span></div>
      </section>`;
    }
    function formulaView() {
      const labels = DATA.formula.map(item => escapeHTML(item.title.split("·")[0].trim()));
      return `<section class="formula-section" style="--accent:#e5bd72">${sectionHeader("01 · PROMPT FORMULA", "万能提示词公式", "", "formula")}
        <div class="section-rule"></div><div class="formula-blueprint"><span class="blueprint-label">完整结构</span><div class="blueprint-chain">${labels.map((label,index)=>`${index?'<i>＋</i>':''}<b>${label}</b>`).join("")}</div></div><div class="formula-menu-grid">${DATA.formula.map(item=>formulaMenuCard(item)).join("")}</div></section>`;
    }
    function oneClickView() {
      const order = ["清理与修复","画质与细节","面部与妆容","假发与发丝","服装与布料","体态与肢体","道具与材质","光影与融合","场景与构图","氛围与天气","特效与能量","色彩与成片"];
      const groups = order.map(name => ({name, items:DATA.oneClick.filter(x=>x.group===name)})).filter(x=>x.items.length);
      return `<section class="one-click-section" style="--accent:#a790ff">${sectionHeader("02 · ONE-CLICK LIBRARY", "一键精修提示词", "按专业后期流程整理为 12 类指令库；点击标题查看完整内容，复制按钮可直接取用。", "oneClick")}
        <div class="section-rule"></div><nav class="category-index" aria-label="精修分类快速导航">${groups.map((group,index)=>`<button data-group-jump="one-group-${index}"><b>${group.name}</b><span>${group.items.length}</span></button>`).join("")}</nav>${groups.map((group,index)=>`<div class="group" id="one-group-${index}"><h3 class="group-title"><b>${group.name}</b><span>${group.items.length} 条</span></h3><div class="one-click-grid">${group.items.map(item=>compactOneClickCard(item)).join("")}</div></div>`).join("")}</section>`;
    }
    function workflowView(key) {
      const isHalf = key === "half";
      const items = DATA[key];
      const accent = isHalf ? "#65d6c5" : "#ee9270";
      if (isHalf) {
        return `<section class="compact-workflow" style="--accent:${accent}">${sectionHeader("03 · SEMI-COMPOSITE", "场照半合成流程", "", key)}<div class="section-rule"></div><div class="linear-flow-grid">${items.map((item,index)=>workflowMenuCard(item,{connector:index<items.length-1})).join("")}</div></section>`;
      }
      const branches = items.filter(item=>item.step===1).sort((a,b)=>(a.variant==="无参考图"?-1:1));
      const common = items.filter(item=>item.step>1);
      return `<section class="compact-workflow" style="--accent:${accent}">${sectionHeader("04 · FULL-COMPOSITE", "场照全合成流程", "", key)}<div class="section-rule"></div><div class="full-horizontal-flow"><div class="branch-column">${branches.map(item=>branchMenuCard(item)).join("")}<span class="flow-arrow" aria-hidden="true"><i></i></span></div>${common.map((item,index)=>workflowMenuCard(item,{connector:index<common.length-1})).join("")}</div></section>`;
    }
    function examplesView() {
      return `<section style="--accent:#e184ae">${sectionHeader("05 · CASE LIBRARY", "使用示例图库", "", "examples")}
        <div class="section-rule"></div><div class="example-grid">${DATA.examples.map(item=>`<article class="prompt-card example-card" data-card-id="${item.id}"><div class="example-image"><img src="${item.image}" alt="${escapeHTML(item.title)}" loading="lazy"><span class="example-number">${String(item.number).padStart(2,"0")}</span></div><div class="example-body"><div class="card-top"><div style="min-width:0;flex:1"><span class="tag">${item.kind}</span><h3 class="card-title" style="margin-top:10px">${escapeHTML(item.title)}</h3></div>${item.qr ? "" : `<button class="copy-btn" title="复制提示词" data-copy-id="${item.id}">${ICON_COPY}</button>`}</div>${item.qr ? qrContent(item) : `<p class="prompt-text clamp">${escapeHTML(item.prompt)}</p>${item.prompt.length>180?`<button class="expand-btn" data-expand>展开全文 ↓</button>`:""}`}</div></article>`).join("")}</div></section>`;
    }
    function searchView(query) {
      const q = query.trim().toLowerCase();
      const results = allItems.filter(item => item.title.toLowerCase().includes(q));
      currentSection = "search";
      document.getElementById("crumb").textContent = "搜索结果";
      if (!results.length) return `<section><p class="eyebrow">SEARCH</p><h2 class="hero-title" style="font-size:46px">“${escapeHTML(query)}”</h2><div class="empty" style="margin-top:34px"><strong>没有找到匹配内容</strong>换一个任务词试试，例如「头发」「去背景」「4K」或「下雪」。</div></section>`;
      return `<section><p class="eyebrow">SEARCH</p><h2 class="hero-title" style="font-size:46px">“${escapeHTML(query)}”</h2><p class="search-summary">找到 ${results.length} 个相关节点</p><div class="search-results">${results.map(item=>item.section==="oneClick"?compactOneClickCard(item):card(item,{tag:sectionMeta[item.section].name})).join("")}</div></section>`;
    }
    function animateStage(content) {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      if (stageAnimation) stageAnimation.cancel();
      stageAnimation = content.animate([
        { opacity: .12, transform: "translate3d(0,14px,0) scale(.992)" },
        { opacity: 1, transform: "translate3d(0,0,0) scale(1)" }
      ], { duration: 460, easing: "cubic-bezier(.22,1,.36,1)", fill: "both" });
      stageAnimation.finished.catch(() => {}).finally(() => { stageAnimation = null; });
    }
    function render(section=currentSection) {
      const query = document.getElementById("search").value;
      const content = document.getElementById("content");
      const update = () => {
        if (query.trim()) content.innerHTML = searchView(query);
        else {
          currentSection = section === "search" ? "overview" : section;
          content.innerHTML = currentSection === "overview" ? overview() : currentSection === "formula" ? formulaView() : currentSection === "oneClick" ? oneClickView() : currentSection === "examples" ? examplesView() : workflowView(currentSection);
        }
        updateNav();
        window.scrollTo({top:0, behavior:firstRender ? "auto" : "smooth"});
      };
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const useViewTransition = !firstRender && !query.trim() && !reducedMotion && typeof document.startViewTransition === "function";
      if (useViewTransition) document.startViewTransition(update);
      else { update(); if (!firstRender && !reducedMotion) animateStage(content); }
      firstRender = false;
    }
    function sectionText(section) {
      if (section === "formula") return DATA.formulaText;
      let items = DATA[section] || [];
      if (section === "full") items = [...items.filter(item=>item.step===1).sort((a,b)=>(a.variant==="无参考图"?-1:1)), ...items.filter(item=>item.step>1)];
      return items.map(item => `${item.step ? `第${item.step}步 · ` : ""}${item.title}\n${item.qr ? "【二维码】请在页面中扫码查看腾讯文档" : item.prompt}`).join("\n\n──────────\n\n");
    }

    document.addEventListener("click", event => {
      const navButton = event.target.closest("[data-section]");
      const jumpButton = event.target.closest("[data-section-jump]");
      if (navButton) navigateSection(navButton.dataset.section);
      if (jumpButton) navigateSection(jumpButton.dataset.sectionJump);
      const groupJump = event.target.closest("[data-group-jump]");
      if (groupJump) document.getElementById(groupJump.dataset.groupJump)?.scrollIntoView({behavior:"smooth", block:"start"});
      const copyButton = event.target.closest("[data-copy-id]");
      if (copyButton) copyText(byId[copyButton.dataset.copyId].prompt, copyButton);
      const openCard = event.target.closest("[data-open-id]");
      if (openCard && !copyButton) openPrompt(openCard.dataset.openId, openCard);
      if (event.target.closest("[data-close-modal]")) requestClosePrompt();
      const special = event.target.closest("[data-copy-special]");
      if (special) copyText(DATA.formulaText, special);
      const copySection = event.target.closest("[data-copy-section]");
      if (copySection) copyText(sectionText(copySection.dataset.copySection), copySection);
      const expand = event.target.closest("[data-expand]");
      if (expand) { const parent=expand.closest(".prompt-card"); parent.classList.toggle("expanded"); expand.textContent=parent.classList.contains("expanded")?"收起全文 ↑":"展开全文 ↓"; }
      if (event.target.closest("[data-collapse]")) document.querySelectorAll(".prompt-card.expanded").forEach(card=>{card.classList.remove("expanded"); const btn=card.querySelector("[data-expand]"); if(btn)btn.textContent="展开全文 ↓";});
    });
    document.getElementById("search").addEventListener("input", () => render(currentSection));
    document.getElementById("mobileMenu").addEventListener("click", () => document.body.classList.toggle("menu-open"));
    window.addEventListener("popstate", event => {
      const modal = document.getElementById("promptModal");
      if (modal.classList.contains("show") && !event.state?.modal) { closePrompt({fromHistory:true}); return; }
      const target = event.state?.xiaoluo ? (event.state.section || "overview") : "overview";
      document.getElementById("search").value = "";
      currentSection = target === "search" ? "overview" : target;
      render(currentSection);
      document.body.classList.remove("menu-open");
    });
    document.addEventListener("keydown", event => {
      const openCard = event.target.closest?.("[data-open-id]");
      if (openCard && !event.target.closest("[data-copy-id]") && (event.key === "Enter" || event.key === " ")) { event.preventDefault(); openPrompt(openCard.dataset.openId, openCard); return; }
      if (event.key === "/" && !document.getElementById("promptModal").classList.contains("show") && document.activeElement.tagName !== "INPUT") { event.preventDefault(); document.getElementById("search").focus(); }
      if (event.key === "Escape" && document.getElementById("promptModal").classList.contains("show")) { requestClosePrompt(); return; }
      if (event.key === "Escape") { document.getElementById("search").value=""; document.getElementById("search").blur(); render(currentSection); }
    });
    history.replaceState({xiaoluo:true, section:"overview"}, "");
    updateNav(); render("overview");
  </script>
</body>
</html>
