<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>小洛 COS 场照生成系统｜交互思维导图</title>
  <style>
    :root {
      --bg: #090b11;
      --panel: rgba(18, 21, 31, .82);
      --panel-solid: #12151f;
      --panel-2: #171b27;
      --line: rgba(255, 255, 255, .09);
      --line-strong: rgba(255, 255, 255, .16);
      --text: #f3efe8;
      --muted: #9c9cab;
      --gold: #e5bd72;
      --gold-soft: #f3d9a6;
      --violet: #a790ff;
      --cyan: #65d6c5;
      --coral: #ee9270;
      --rose: #e184ae;
      --shadow: 0 24px 80px rgba(0,0,0,.36);
      --radius: 24px;
      --sidebar: 286px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 88% 8%, rgba(167,144,255,.12), transparent 28%),
        radial-gradient(circle at 12% 88%, rgba(101,214,197,.08), transparent 30%),
        var(--bg);
      font-family: Inter, "SF Pro Display", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .18;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.12'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
      z-index: 20;
    }

    button, input { font: inherit; }
    button { color: inherit; }
    .app { min-height: 100vh; }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      width: var(--sidebar);
      padding: 30px 22px 24px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: rgba(9,11,17,.78);
      backdrop-filter: blur(26px);
      z-index: 10;
    }

    .brand { padding: 3px 8px 28px; }
    .brand-mark {
      width: 42px; height: 42px; margin-bottom: 18px;
      display: grid; place-items: center;
      border: 1px solid rgba(229,189,114,.38);
      border-radius: 14px;
      color: var(--gold);
      background: linear-gradient(145deg, rgba(229,189,114,.14), rgba(229,189,114,.025));
      box-shadow: inset 0 1px rgba(255,255,255,.1), 0 14px 34px rgba(0,0,0,.2);
      font: 600 19px/1 Georgia, serif;
    }
    .brand h1 { margin: 0; font: 500 21px/1.35 Georgia, "Songti SC", serif; letter-spacing: .04em; }
    .brand p { margin: 8px 0 0; color: var(--muted); font-size: 12px; letter-spacing: .08em; }

    .search-wrap { position: relative; margin-bottom: 22px; }
    .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #7d7d89; }
    .search-wrap input {
      width: 100%; height: 45px; padding: 0 42px 0 42px;
      color: var(--text); outline: none;
      border: 1px solid var(--line); border-radius: 14px;
      background: rgba(255,255,255,.035);
      transition: .2s ease;
    }
    .search-wrap input:focus { border-color: rgba(229,189,114,.45); box-shadow: 0 0 0 4px rgba(229,189,114,.06); }
    .shortcut { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #6f6f7a; font-size: 11px; }

    .nav-label { margin: 0 10px 8px; color: #656571; font-size: 10px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; }
    .nav { display: grid; gap: 5px; }
    .nav-btn {
      width: 100%; min-height: 47px; padding: 0 12px;
      display: flex; align-items: center; gap: 12px;
      border: 0; border-radius: 13px; background: transparent; cursor: pointer;
      color: #aaaab5; text-align: left; transition: .18s ease;
    }
    .nav-btn:hover { color: var(--text); background: rgba(255,255,255,.045); }
    .nav-btn.active { color: var(--text); background: linear-gradient(90deg, rgba(229,189,114,.13), rgba(229,189,114,.035)); }
    .nav-dot { width: 8px; height: 8px; border: 1px solid currentColor; border-radius: 50%; box-shadow: 0 0 0 4px color-mix(in srgb, currentColor 10%, transparent); }
    .nav-btn.active .nav-dot { background: currentColor; }
    .nav-name { flex: 1; font-size: 13px; }
    .nav-count { color: #656571; font-size: 11px; font-variant-numeric: tabular-nums; }
    .nav-btn[data-section="formula"] { color: var(--gold-soft); }
    .nav-btn[data-section="oneClick"] { color: var(--violet); }
    .nav-btn[data-section="half"] { color: var(--cyan); }
    .nav-btn[data-section="full"] { color: var(--coral); }
    .nav-btn[data-section="examples"] { color: var(--rose); }

    .sidebar-foot { margin-top: auto; padding: 20px 9px 0; border-top: 1px solid var(--line); color: #686874; font-size: 11px; line-height: 1.65; }
    .main { margin-left: var(--sidebar); min-height: 100vh; }
    .topbar {
      height: 78px; padding: 0 46px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 8;
      border-bottom: 1px solid var(--line);
      background: rgba(9,11,17,.72); backdrop-filter: blur(24px);
    }
    .breadcrumb { display: flex; align-items: center; gap: 10px; color: #7d7d88; font-size: 12px; }
    .breadcrumb strong { color: var(--text); font-weight: 550; }
    .top-actions { display: flex; gap: 9px; }
    .button {
      min-height: 38px; padding: 0 15px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border: 1px solid var(--line-strong); border-radius: 11px; cursor: pointer;
      background: rgba(255,255,255,.035); color: #c7c5ca; font-size: 12px; transition: .18s ease;
    }
    .button:hover { transform: translateY(-1px); border-color: rgba(229,189,114,.45); color: var(--text); }
    .button.primary { color: #17140e; border-color: transparent; background: linear-gradient(135deg, #f0cf91, #d6a757); box-shadow: 0 10px 30px rgba(213,168,86,.17); font-weight: 700; }

    .content { max-width: 1500px; margin: 0 auto; padding: 52px 46px 86px; }
    .eyebrow { margin: 0 0 15px; color: var(--gold); font-size: 10px; font-weight: 800; letter-spacing: .22em; text-transform: uppercase; }
    .hero-title { margin: 0; max-width: 830px; font: 500 clamp(36px,4vw,64px)/1.1 Georgia, "Songti SC", serif; letter-spacing: -.025em; }
    .hero-title em { color: var(--gold-soft); font-style: normal; }
    .hero-sub { max-width: 680px; margin: 20px 0 0; color: var(--muted); font-size: 15px; line-height: 1.8; }
    .stats { display: flex; flex-wrap: wrap; gap: 28px; margin-top: 30px; }
    .stat { min-width: 96px; }
    .stat strong { display: block; font: 500 28px/1 Georgia, serif; }
    .stat span { display: block; margin-top: 7px; color: #777783; font-size: 10px; letter-spacing: .13em; text-transform: uppercase; }

    .mindmap {
      position: relative; min-height: 610px; margin-top: 44px;
      border: 1px solid var(--line); border-radius: 32px; overflow: hidden;
      background:
        linear-gradient(rgba(255,255,255,.026) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.026) 1px, transparent 1px),
        radial-gradient(circle at 50% 50%, rgba(229,189,114,.055), transparent 24%),
        rgba(16,18,27,.68);
      background-size: 42px 42px, 42px 42px, auto, auto;
      box-shadow: var(--shadow), inset 0 1px rgba(255,255,255,.035);
    }
    .map-kicker { position: absolute; left: 26px; top: 24px; color: #676773; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; }
    .connections { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    .connections path { fill: none; stroke-width: 1.35; opacity: .62; }
    .map-root {
      position: absolute; left: 50%; top: 47%; transform: translate(-50%,-50%);
      width: 220px; aspect-ratio: 1; padding: 26px; display: grid; place-items: center; text-align: center;
      border-radius: 50%; border: 1px solid rgba(229,189,114,.38);
      background: radial-gradient(circle at 35% 28%, rgba(239,207,145,.18), rgba(20,21,28,.96) 68%);
      box-shadow: 0 0 0 13px rgba(229,189,114,.035), 0 24px 70px rgba(0,0,0,.42), inset 0 1px rgba(255,255,255,.11);
    }
    .map-root span { display: block; color: var(--gold); font-size: 10px; letter-spacing: .18em; text-transform: uppercase; }
    .map-root strong { display: block; margin-top: 10px; font: 500 24px/1.28 Georgia, "Songti SC", serif; }
    .map-root small { display: block; margin-top: 9px; color: #85858f; font-size: 11px; }
    .map-node {
      position: absolute; width: 220px; padding: 18px 18px 17px;
      border: 1px solid var(--line); border-radius: 19px; cursor: pointer; text-align: left;
      background: rgba(19,22,32,.93); box-shadow: 0 18px 46px rgba(0,0,0,.25), inset 0 1px rgba(255,255,255,.04);
      transition: .22s cubic-bezier(.2,.8,.2,1);
    }
    .map-node:hover { transform: translateY(-4px); border-color: color-mix(in srgb, var(--accent) 52%, transparent); box-shadow: 0 24px 60px rgba(0,0,0,.35), 0 0 0 4px color-mix(in srgb, var(--accent) 6%, transparent); }
    .map-node .node-top { display: flex; align-items: center; justify-content: space-between; }
    .map-node .node-index { color: var(--accent); font: 500 12px/1 Georgia, serif; }
    .map-node .node-count { color: #686873; font-size: 10px; }
    .map-node strong { display: block; margin-top: 13px; font-size: 15px; font-weight: 600; }
    .map-node p { margin: 7px 0 0; color: #8e8e9b; font-size: 11px; line-height: 1.55; }
    .map-node.formula { --accent: var(--gold); left: 7%; top: 13%; }
    .map-node.oneClick { --accent: var(--violet); left: 5%; top: 59%; }
    .map-node.half { --accent: var(--cyan); right: 6%; top: 10%; }
    .map-node.full { --accent: var(--coral); right: 4%; top: 55%; }
    .map-node.examples { --accent: var(--rose); left: 50%; bottom: 4%; transform: translateX(-50%); }
    .map-node.examples:hover { transform: translateX(-50%) translateY(-4px); }

    .route-strip { margin-top: 22px; padding: 20px 22px; display: flex; align-items: center; gap: 14px; border: 1px solid var(--line); border-radius: 18px; background: rgba(255,255,255,.024); color: #8f8f9b; font-size: 12px; }
    .route-strip b { color: var(--text); font-weight: 600; }
    .route-arrow { color: #4e4e58; }

    .section-head { display: flex; align-items: end; justify-content: space-between; gap: 24px; margin-bottom: 34px; }
    .section-head h2 { margin: 0; font: 500 clamp(32px,4vw,52px)/1.15 Georgia, "Songti SC", serif; }
    .section-head p { max-width: 600px; margin: 13px 0 0; color: var(--muted); line-height: 1.7; font-size: 14px; }
    .section-tools { display: flex; gap: 8px; flex-shrink: 0; }
    .section-rule { height: 1px; margin: 0 0 30px; background: linear-gradient(90deg, var(--accent, var(--gold)), transparent 65%); opacity: .45; }

    .group { margin-top: 38px; }
    .group:first-child { margin-top: 0; }
    .group-title { display: flex; align-items: center; gap: 12px; margin: 0 0 16px; font-size: 13px; }
    .group-title::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--accent, var(--violet)); box-shadow: 0 0 0 5px color-mix(in srgb, var(--accent, var(--violet)) 10%, transparent); }
    .group-title span { color: #6f6f7b; font-size: 11px; font-weight: 400; }
    .card-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
    .prompt-card {
      position: relative; min-width: 0; padding: 21px;
      border: 1px solid var(--line); border-radius: 19px;
      background: linear-gradient(145deg, rgba(255,255,255,.04), rgba(255,255,255,.018));
      box-shadow: inset 0 1px rgba(255,255,255,.025); transition: .2s ease;
    }
    .prompt-card:hover { border-color: var(--line-strong); background: linear-gradient(145deg, rgba(255,255,255,.055), rgba(255,255,255,.022)); }
    .card-top { display: flex; align-items: flex-start; gap: 12px; }
    .card-title { flex: 1; min-width: 0; margin: 0; font-size: 14px; font-weight: 650; line-height: 1.45; }
    .tag { display: inline-flex; align-items: center; min-height: 23px; padding: 0 8px; border: 1px solid var(--line); border-radius: 999px; color: #868691; background: rgba(255,255,255,.025); font-size: 9px; letter-spacing: .06em; white-space: nowrap; }
    .copy-btn {
      flex: none; width: 34px; height: 34px; display: grid; place-items: center;
      border: 1px solid var(--line); border-radius: 10px; background: rgba(255,255,255,.025); cursor: pointer; color: #8c8c98;
      transition: .18s ease;
    }
    .copy-btn:hover { color: var(--gold); border-color: rgba(229,189,114,.35); }
    .copy-btn.copied { color: var(--cyan); border-color: rgba(101,214,197,.38); }
    .prompt-text { margin: 15px 0 0; color: #b1afb5; font-size: 12px; line-height: 1.82; white-space: pre-wrap; word-break: break-word; }
    .prompt-text.clamp { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 5; overflow: hidden; }
    .prompt-card.expanded .prompt-text.clamp { display: block; }
    .expand-btn { margin-top: 13px; padding: 0; border: 0; background: none; color: var(--gold); font-size: 11px; cursor: pointer; }

    .formula-stack { display: grid; gap: 0; max-width: 1040px; margin: 0 auto; }
    .formula-row { position: relative; display: grid; grid-template-columns: 72px 1fr; gap: 22px; padding-bottom: 20px; }
    .formula-row:not(:last-child)::before { content: ""; position: absolute; left: 35px; top: 64px; bottom: -3px; width: 1px; background: linear-gradient(var(--gold), rgba(229,189,114,.12)); }
    .formula-number { width: 72px; height: 72px; display: grid; place-items: center; border: 1px solid rgba(229,189,114,.25); border-radius: 50%; color: var(--gold); background: rgba(229,189,114,.055); font: 500 16px/1 Georgia, serif; }
    .formula-card { padding: 24px; border: 1px solid var(--line); border-radius: 20px; background: var(--panel); }
    .formula-card .card-title { font-family: Georgia, "Songti SC", serif; font-size: 18px; font-weight: 500; }

    .workflow { position: relative; max-width: 1120px; margin: 0 auto; }
    .workflow::before { content: ""; position: absolute; left: 31px; top: 33px; bottom: 33px; width: 1px; background: linear-gradient(var(--accent), rgba(255,255,255,.05)); opacity: .55; }
    .step { position: relative; display: grid; grid-template-columns: 64px 1fr; gap: 22px; margin-bottom: 20px; }
    .step:last-child { margin-bottom: 0; }
    .step-index { position: relative; z-index: 1; width: 64px; height: 64px; display: grid; place-items: center; border: 1px solid color-mix(in srgb, var(--accent) 38%, transparent); border-radius: 18px; color: var(--accent); background: var(--panel-solid); font: 500 20px/1 Georgia, serif; box-shadow: 0 0 0 7px var(--bg); }
    .step .prompt-card { padding: 24px; }
    .step-tool { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 26%, transparent); }

    .example-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 16px; }
    .example-card { overflow: hidden; padding: 0; }
    .example-image { position: relative; aspect-ratio: 16/9; overflow: hidden; background: #161821; }
    .example-image img { width: 100%; height: 100%; display: block; object-fit: cover; transition: .4s ease; }
    .example-card:hover img { transform: scale(1.025); }
    .example-number { position: absolute; left: 12px; top: 12px; min-width: 30px; height: 25px; padding: 0 8px; display: grid; place-items: center; border: 1px solid rgba(255,255,255,.18); border-radius: 9px; color: #fff; background: rgba(8,9,14,.62); backdrop-filter: blur(12px); font: 500 11px/1 Georgia, serif; }
    .example-body { padding: 18px; }

    .search-results { display: grid; gap: 14px; }
    .search-summary { margin: -18px 0 26px; color: #767681; font-size: 12px; }
    mark { color: var(--text); background: rgba(229,189,114,.24); border-radius: 3px; }
    .empty { padding: 90px 24px; text-align: center; border: 1px dashed var(--line-strong); border-radius: 22px; color: #777783; }
    .empty strong { display: block; margin-bottom: 8px; color: var(--text); font: 500 24px/1.3 Georgia, "Songti SC", serif; }

    .toast { position: fixed; left: calc(var(--sidebar) + (100vw - var(--sidebar))/2); bottom: 30px; transform: translate(-50%, 18px); min-width: 180px; padding: 12px 17px; border: 1px solid rgba(101,214,197,.28); border-radius: 12px; color: #bdf2e9; background: rgba(15,29,29,.9); backdrop-filter: blur(16px); box-shadow: var(--shadow); font-size: 12px; text-align: center; opacity: 0; pointer-events: none; transition: .22s ease; z-index: 30; }
    .toast.show { opacity: 1; transform: translate(-50%,0); }
    .mobile-menu { display: none; }

    @media (max-width: 1100px) {
      :root { --sidebar: 240px; }
      .content { padding-left: 30px; padding-right: 30px; }
      .topbar { padding: 0 30px; }
      .map-node { width: 195px; }
      .map-node.formula { left: 3%; }
      .map-node.oneClick { left: 2%; }
      .map-node.half { right: 3%; }
      .map-node.full { right: 2%; }
      .example-grid { grid-template-columns: repeat(2,minmax(0,1fr)); }
    }
    @media (max-width: 820px) {
      :root { --sidebar: 0px; }
      .sidebar { transform: translateX(-100%); transition: .22s ease; width: 280px; }
      body.menu-open .sidebar { transform: translateX(0); }
      .main { margin-left: 0; }
      .mobile-menu { display: grid; place-items: center; width: 38px; height: 38px; border: 1px solid var(--line); border-radius: 10px; background: rgba(255,255,255,.03); }
      .topbar { height: 68px; padding: 0 18px; }
      .top-actions .button:not(.primary) { display: none; }
      .content { padding: 34px 18px 64px; }
      .mindmap { min-height: auto; padding: 76px 18px 22px; display: grid; gap: 12px; }
      .connections, .map-root { display: none; }
      .map-node, .map-node.formula, .map-node.oneClick, .map-node.half, .map-node.full, .map-node.examples { position: static; width: 100%; transform: none; }
      .map-node.examples:hover { transform: translateY(-4px); }
      .card-grid, .example-grid { grid-template-columns: 1fr; }
      .section-head { align-items: flex-start; flex-direction: column; }
      .section-tools { width: 100%; }
      .section-tools .button { flex: 1; }
      .formula-row { grid-template-columns: 48px 1fr; gap: 13px; }
      .formula-number { width: 48px; height: 48px; }
      .formula-row:not(:last-child)::before { left: 23px; top: 48px; }
      .workflow::before { left: 23px; }
      .step { grid-template-columns: 48px 1fr; gap: 13px; }
      .step-index { width: 48px; height: 48px; border-radius: 14px; }
      .route-strip { align-items: flex-start; flex-wrap: wrap; }
      .toast { left: 50%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">L</div>
        <h1>小洛提示词<br>视觉工作台</h1>
        <p>COS POST-PRODUCTION</p>
      </div>
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="m16.5 16.5 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <input id="search" type="search" placeholder="搜索标题…" autocomplete="off">
        <span class="shortcut">/</span>
      </div>
      <p class="nav-label">Mind Map</p>
      <nav id="nav" class="nav"></nav>
      <div class="sidebar-foot">离线可用 · 支持标题搜索<br>点击任意复制按钮即可取用</div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="mobile-menu" id="mobileMenu" aria-label="打开菜单">☰</button>
          <div class="breadcrumb"><span>小洛</span><span>／</span><strong id="crumb">总览地图</strong></div>
        </div>
        <div class="top-actions">
          <button class="button" data-copy-special="formula">复制万能骨架</button>
          <button class="button primary" data-section-jump="oneClick">开始查找提示词</button>
        </div>
      </header>
      <div id="content" class="content"></div>
    </main>
  </div>
  <div id="toast" class="toast">已复制到剪贴板</div>

  <script>
    const DATA = {"title": "小洛 COS 场照生成系统", "subtitle": "从一键精修到完整场照合成 · 可视化提示词工作台", "formula": [{"id": "formula-prefix", "index": "01", "title": "固定前缀 · 锁定原图", "prompt": "你需要去做一次cos后期合成，你需要在处理时遵守以下准则：不改变原有构图，不改变原图光影，不改变原有饱和度，不改变原图色调；不做旋转缩放处理，不改变人物姿势。"}, {"id": "formula-body", "index": "02", "title": "主体描述 · 自定义需求", "prompt": "按照自己的想法or问豆包、GPT\n自行输入"}, {"id": "formula-limit", "index": "03", "title": "镜头限定 · 统一透视", "prompt": "符合35MM，F2.8光圈的透视效果，微仰拍的视角，匹配原图色调饱和度"}, {"id": "formula-suffix", "index": "04", "title": "质感后缀 · 统一成片", "prompt": "顶级游戏CG级画风质感，3D建模材质，优化细节及其纹理质感。"}], "formulaText": "你需要去做一次cos后期合成，你需要在处理时遵守以下准则：不改变原有构图，不改变原图光影，不改变原有饱和度，不改变原图色调；不做旋转缩放处理，不改变人物姿势。\n\n【主体 / 场景 / 特效需求】\n按照自己的想法or问豆包、GPT\n自行输入\n\n符合35MM，F2.8光圈的透视效果，微仰拍的视角，匹配原图色调饱和度\n\n顶级游戏CG级画风质感，3D建模材质，优化细节及其纹理质感。", "oneClick": [{"id": "one-2", "title": "一键高清", "prompt": "让此区域变得清晰锐利，提高分辨率，优化细节与纹理", "group": "清理与修复"}, {"id": "one-3", "title": "一键去除背景杂物", "prompt": "移除背景路人、闪光灯和灯架以及灯的炫光，只保留人物主体和干净的场馆，保持构图光影色彩与原图一致，不缩放旋转，保持人物动作不变，不改场馆建筑本身结构以及原本透视效果，无缝融合。", "group": "清理与修复"}, {"id": "one-4", "title": "一键去除梯子、箱子", "prompt": "移除人物坐着的梯子，保持人物动作不变", "group": "清理与修复"}, {"id": "one-5", "title": "一键补全", "prompt": "以红色部分为基础，补全人物手中蓝白色刀的刀柄部分", "group": "清理与修复"}, {"id": "one-6", "title": "一键替换", "prompt": "将人物坐着的梯子替换成一个粗壮的树桩", "group": "道具与替换"}, {"id": "one-7", "title": "一键去除杂毛碎发", "prompt": "去除人物杂乱毛糙的单根头发以及碎发，让头发整体变得顺滑", "group": "清理与修复"}, {"id": "one-8", "title": "一键替换头发", "prompt": "将人物的发型变得像参考图中一样的形状，不改变头部其他部分，只改变头发部分", "group": "人物与造型"}, {"id": "one-9", "title": "一键替换美瞳", "prompt": "将人物的眼睛变的像蓝紫色星空一样的瞳色，只改变眼睛瞳孔部分，不改变其他面部部分，眼镜部分也保持不变", "group": "道具与替换"}, {"id": "one-10", "title": "一键头发飘逸", "prompt": "去除人物杂乱毛糙的单根头发以及碎发，让人物的黑色长发被风向右吹起，呈现自然飘起的状态，让头发整体变得顺滑且飘逸", "group": "人物与造型"}, {"id": "one-11", "title": "一键Cup变大", "prompt": "让衣服变得柔顺无褶皱，人物身材变得丰满，不改变人物衣服样式、材质。不改变人物动作，让人物的罩杯尺寸变为F杯以上。", "group": "人物与造型"}, {"id": "one-12", "title": "一键裙摆飘逸", "prompt": "让人物的裙摆被风向右吹起，呈现自然飘起的状态，让裙子整体变得顺滑飘逸，如同真实衣物质感一样。", "group": "人物与造型"}, {"id": "one-13", "title": "一键下雪", "prompt": "让整个场景下起大雪，与人物、道具等接触的地方有自然的积雪。", "group": "氛围与天气"}, {"id": "one-14", "title": "一键下雨", "prompt": "让整个场景下期大雨，在人物身上已经与场景接触的地方有溅起的雨水", "group": "氛围与天气"}, {"id": "one-15", "title": "一键花瓣飞舞", "prompt": "整个场景飞舞着桃花花瓣，被风吹的向右飘起，部分花瓣前后错落，靠近镜头的有一定高斯模糊和动态模糊，符合场景透视", "group": "氛围与天气"}, {"id": "one-16", "title": "一键落叶纷飞", "prompt": "整个场景有纷飞的落叶，被风吹的向右飘落，部分落叶前后错落，靠近镜头的有一定高斯模糊和动态模糊，符合场景透视", "group": "氛围与天气"}, {"id": "one-17", "title": "一键动物道具复活", "prompt": "将人物脖子上的道具白蛇变成真实生动的效果，凶狠的盯着左边", "group": "道具与替换"}, {"id": "one-18", "title": "一键武器道具真实化", "prompt": "让人物手中的武器道具有真实质感，不改变武器原本构造，武器头部里镶嵌着一个冰蓝色水晶，并且武器上结了少量冰晶，法杖的杖杆部分是蓝色的。", "group": "道具与替换"}, {"id": "one-19", "title": "一键腹肌", "prompt": "将图中人物的腹部变为标准的八块腹肌", "group": "人物与造型"}, {"id": "one-20", "title": "一键女生马甲线", "prompt": "优化女生人物身材比例，使手臂更加纤细自然，腰部更瘦更紧致，腹部呈现清晰但不过度夸张的马甲线，整体体型健康匀称、线条流畅。保持原人物姿势、表情、服装、光影、背景不变，保持身体上的质感和程度完全不变，避免改变人物身份和画面风格。", "group": "人物与造型"}, {"id": "one-21", "title": "亮调背景去头发黑边", "prompt": "请以当前图片为基础进行局部精修，保持人物主体整体不变，不重做人像，不改变构图，不改变头部位置，不改变人物五官、表情和神态，不改变头顶苹果，不改变服装与背景氛围。\n本次仅针对头发外侧边缘的抠图黑边痕迹进行清理，并适度优化头发质感，让头发边缘更自然干净、更有空气感。\n修正要求\n主体严格锁定\n保留人物的脸部轮廓、五官比例、眼神、表情、妆容、头部朝向、头部位置、发型整体结构、发色、服装领口、披风边缘、肩部结构，以及原图整体构图、景别和画面氛围。\n不要改脸，不要换脸，不要改变五官，不要改变表情，不要改变头部角度，不要改变苹果，不要改变服装，不要降低人物主体清晰度。\n清理头发边缘黑边\n重点清除头发顶部外轮廓、左右两侧发梢、靠近背景处的头发边缘，以及细碎发丝末端周围残留的黑边、暗边、脏边和不自然硬边。\n清理后头发边缘要自然过渡，不要修糊，不要出现白边、灰边、边缘发光、发虚或新的抠图痕迹。\n保留发丝层次感，不要把头发边缘修成整块生硬轮廓，要让头发与背景衔接自然干净，像真实拍摄而不是粗糙抠图。\n头发质感轻微优化\n在清除黑边的基础上，适度优化头发，让头发更自然、更柔顺、更有空气感，但不能改变原本发型设计。\n保持原本发型的整体轮廓、长度、刘海走向和层次关系不变；可增加少量自然细碎发丝，让边缘更真实；发丝层次更清楚、发梢可轻微自然散开，但不要过分浓密、蓬松、炸毛或凌乱。\n整体仍要保留 cos 假发质感，但看起来更自然、更高级。\n重点限制\n人物五官、脸型结构、眼睛形状、视线方向、鼻子、嘴巴、下颌线、人物气质、头部大小、头部位置、头部朝向、服装领口、披风边缘、金属装饰、背景整体颜色与氛围都必须保持不变。\n不要因为修头发而连带修改脸型、眉眼、鼻口或服装边缘。\n画面质感要求\n整体保持真实摄影质感和高级 cos 场照修图质感。\n发丝细节自然清晰，边缘干净但不过度锐化；不要过度磨皮，不要塑料感，不要明显 AI 重绘感，不要让头发边缘假、硬、糊、脏。\n最终效果应像专业后期对头发边缘进行精修，并加入轻微自然风感，而不是重做一颗新头。\n负面限制\n不要改脸，不要换脸，不要改变五官，不要改变头部位置；\n不要夸张吹风，不要让头发大幅飞起；\n不要新增大量碎发，不要炸毛，不要凌乱；\n不要出现新的白边、黑边、锯齿边、发虚边；\n不要改变背景，不要改变色调，不要改变整体氛围；\n不要过度磨皮，不要过度锐化，不要出现明显 AI 修图痕迹。", "group": "人物与造型"}, {"id": "one-22", "title": "亮调背景去全身黑边", "prompt": "请以当前图片为基础进行局部精修与全身细化优化，保持人物主体整体不变，不重做人像，不改变构图，不改变头部位置，不改变人物五官、表情和神态，不改变人物主体动作，不改变服装与背景氛围。\n本次修正重点是针对人物全身边缘、主体轮廓、服装边缘、发丝边缘、手部与腿部边缘、道具边缘以及人物整体质感进行精修处理，清理抠图痕迹，优化主体边缘与细节，让人物整体更自然干净、更有空气感和真实摄影质感，同时保持原图人物完全一致，不产生明显 AI 重绘感。\n\n修正要求\n一、主体严格锁定\n保留人物的脸部轮廓、五官比例、眼神、表情、妆容、头部朝向、头部位置、发型整体结构、发色、服装结构、服装配色、服装边缘、肩部结构、手部姿态、腿部姿态、身体比例、人物动作、人物在画面中的位置、大小、占比，以及原图整体构图、景别和画面氛围。\n不要改脸，不要换脸，不要改变五官，不要改变表情，不要改变头部角度，不要改变发型整体设计，不要改变服装，不要改变人物动作，不要改变人物比例，不要降低人物主体清晰度。\n如果原图中有头顶装饰、发饰、配件、武器或其他道具，这些也都必须保持不变，不要改动其造型、位置、大小和结构。\n\n二、清理人物全身边缘抠图痕迹\n重点清除人物全身外轮廓周围残留的黑边、暗边、脏边、不自然硬边、发虚边和粗糙抠图痕迹。\n●处理范围包括但不限于：头发顶部外轮廓\n●左右两侧发梢与细碎发丝边缘\n●脸部轮廓与发丝交界处\n●颈部、肩膀、手臂、手肘、手腕等边缘\n●手指边缘与背景交界处\n●服装边缘\n●腿部、膝盖、小腿、脚踝、鞋子边缘\n●毛绒装饰、尾部装饰、金属饰品、武器边缘\n●人物与地面接触处、人物与背景交接处\n清理后，人物边缘要自然过渡，不要修糊，不要出现白边、灰边、边缘发光、边缘断裂、边缘发虚或新的抠图痕迹。\n要让人物整体边缘干净利落，但不能修成过于生硬的硬轮廓线。\n三、人物整体质感轻微优化\n在清除边缘问题的基础上，适度优化人物全身质感，让主体看起来更自然、更完整、更高级，但不能改变原本人物设计。\n1. 头发部分\n保持原本发型的整体轮廓、长度、刘海走向、层次关系和发色不变。\n可适度增加少量自然细碎发丝，让发丝边缘更真实、更有空气感；但不要过分浓密、蓬松、炸毛或凌乱。\n整体仍要保留 cos 假发质感，但看起来更自然、更高级。\n2. 面部与皮肤部分\n保持脸型结构、五官比例、眼神、神态、妆容完全不变。\n可以对皮肤做轻微优化，让肤质更干净细腻、明暗更自然，但不能过度磨皮，不能塑料感，不能失去真实摄影皮肤纹理。\n不要改变鼻子、嘴巴、眼睛、下颌线，不要因为精修影响人物原本气质。\n3. 服装部分\n保持服装整体结构、版型、颜色、纹样、配饰、金属件和层次关系不变。\n可轻微优化服装边缘，使布料边缘更干净自然；适当增强服装褶皱、布料层次和材质清晰度，让服装更有真实质感。\n不要把服装改形，不要重画服装，不要改变服装花纹，不要改变服装受光逻辑。4. 手部与腿部部分\n保持手部姿势、手指形态、腿部姿态、身体比例完全不变。\n优化手部和腿部边缘，让边缘更自然、干净，没有脏边和锯齿感。\n可以轻微优化皮肤和受光，让肢体质感更统一，但不要让手变形，不要让腿部比例变化，不要过度磨皮。\n5. 道具与装饰部分\n保留武器、金属装饰、发饰、挂件、毛绒装饰等所有道具的造型、位置、大小、透视关系完全不变。\n可轻微优化其边缘干净度与局部质感，使其更清晰自然，但不要新增细节，不要重画，不要改变结构。\n四、增强人物与环境的自然融合\n在不改变背景、不改变整体氛围的前提下，让人物全身与环境融合得更加自然。\n可适度优化以下方面：\n●人物边缘吸收少量环境色\n●人物局部受光与背景光线更统一\n●人物下方与地面的接触关系更自然\n●人物与背景交界处过渡更柔和\n●人物边缘有轻微空气感，但不发虚\n●人物整体不再像单独抠出来贴在背景上\n如果人物脚下、衣摆、武器或毛绒装饰靠近地面，可以轻微增强接地感与环境接触感，但不能改变人物姿态和构图。\n\n五、重点限制\n人物五官、脸型结构、眼睛形状、视线方向、鼻子、嘴巴、下颌线、人物气质、头部大小、头部位置、头部朝向、头发整体结构、服装轮廓、服装配件、金属装饰、武器、身体动作、肢体比例、背景整体颜色与氛围都必须保持不变。\n不要因为精修全身边缘而连带修改：\n●脸型\n●眉眼\n●鼻口\n●下巴\n●头部位置\n●手部结构\n●腿部形态\n●衣服版型\n●道具位置\n●背景结构\n\n六、画面质感要求\n整体保持真实摄影质感和高级 cos           <svg class="connections" viewBox="0 0 1200 610" preserveAspectRatio="none" aria-hidden="true">
            <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#e5bd72"/><stop offset="1" stop-color="#a790ff"/></linearGradient></defs>
            <path d="M515 272 C430 250 360 175 260 155" stroke="#e5bd72"/>
            <path d="M507 325 C405 350 350 420 245 430" stroke="#a790ff"/>
            <path d="M692 268 C790 235 820 160 940 145" stroke="#65d6c5"/>
            <path d="M695 330 C790 355 845 405 960 415" stroke="#ee9270"/>
            <path d="M600 385 C600 430 600 470 600 510" stroke="#e184ae"/>
          </svg>
          <div class="map-root"><div><span>Core System</span><strong>小洛 COS<br>场照生成</strong><small>Prompt Workflow</small></div></div>
          <button class="map-node formula" data-section-jump="formula"><div class="node-top"><span class="node-index">01</span><span class="node-count">4 PARTS</span></div><strong>万能提示词公式</strong><p>前缀 × 主体 × 限定 × 质感后缀</p></button>
          <button class="map-node oneClick" data-section-jump="oneClick"><div class="node-top"><span class="node-index">02</span><span class="node-count">${DATA.oneClick.length} ITEMS</span></div><strong>一键精修提示词</strong><p>清理、造型、氛围、道具增强</p></button>
          <button class="map-node half" data-section-jump="half"><div class="node-top"><span class="node-index">03</span><span class="node-count">${DATA.half.length} STEPS</span></div><strong>半合成工作流</strong><p>保留场馆骨架，逐层丰富画面</p></button>
          <button class="map-node full" data-section-jump="full"><div class="node-top"><span class="node-index">04</span><span class="node-count">5 STEPS</span></div><strong>全合成工作流</strong><p>从构思、生成到最终精修</p></button>
          <button class="map-node examples" data-section-jump="examples"><div class="node-top"><span class="node-index">05</span><span class="node-count">${DATA.examples.length} CASES</span></div><strong>使用示例图库</strong><p>原表样片与完整提示词对照</p></button>
        </div>
        <div class="route-strip"><b>推荐路径</b><span>先用万能公式搭骨架</span><span class="route-arrow">→</span><span>选择半合成 / 全合成</span><span class="route-arrow">→</span><span>叠加一键精修</span><span class="route-arrow">→</span><span>参考案例校准质感</span></div>
      </section>`;
    }
    function formulaView() {
      return `<section style="--accent:#e5bd72">${sectionHeader("01 · PROMPT FORMULA", "万能提示词公式", "把提示词拆成四个稳定模块。只需替换第二段的角色、场景和特效需求，就能快速拼成一条完整指令。", "formula")}
        <div class="section-rule"></div><div class="formula-stack">${DATA.formula.map(item => `<div class="formula-row"><div class="formula-number">${item.index}</div><div class="formula-card">${card(item)}</div></div>`).join("")}</div></section>`;
    }
    function oneClickView() {
      const order = ["清理与修复","人物与造型","氛围与天气","道具与替换"];
      const groups = order.map(name => ({name, items:DATA.oneClick.filter(x=>x.group===name)})).filter(x=>x.items.length);
      return `<section style="--accent:#a790ff">${sectionHeader("02 · ONE-CLICK LIBRARY", "一键精修提示词", "按任务类型重新归类。适合完成主合成后做局部修正，也可直接用于单项编辑。", "oneClick")}
        <div class="section-rule"></div>${groups.map(group=>`<div class="group"><h3 class="group-title">${group.name}<span>${group.items.length} 条</span></h3><div class="card-grid">${group.items.map(item=>card(item)).join("")}</div></div>`).join("")}</section>`;
    }
    function workflowView(key) {
      const isHalf = key === "half";
      const items = DATA[key];
      const accent = isHalf ? "#65d6c5" : "#ee9270";
      return `<section style="--accent:${accent}">${sectionHeader(isHalf?"03 · SEMI-COMPOSITE":"04 · FULL-COMPOSITE", isHalf?"场照半合成流程":"场照全合成流程", isHalf?"保留原场馆顶部钢架与背景墙，用四步完成清理、布景、特效和高清修复。":"适合大幅重构场景：从询问 AI 生成完整方案，到画面生成、特效叠加、放大和边缘精修。", key)}
        <div class="section-rule"></div><div class="workflow">${items.map(item=>`<div class="step"><div class="step-index">${String(item.step).padStart(2,"0")}</div>${card(item,{tag:item.tool,className:"step-card"})}</div>`).join("")}</div></section>`;
    }
    function examplesView() {
      return `<section style="--accent:#e184ae">${sectionHeader("05 · CASE LIBRARY", "使用示例图库", "保留原工作簿中的 17 张样片缩略图。前 9 项附完整场景提示词，后 8 项为原表中的案例索引。", "examples")}
        <div class="section-rule"></div><div class="example-grid">${DATA.examples.map(item=>`<article class="prompt-card example-card" data-card-id="${item.id}"><div class="example-image"><img src="${item.image}" alt="${escapeHTML(item.title)}" loading="lazy"><span class="example-number">${String(item.number).padStart(2,"0")}</span></div><div class="example-body"><div class="card-top"><div style="min-width:0;flex:1"><span class="tag">${item.kind}</span><h3 class="card-title" style="margin-top:10px">${escapeHTML(item.title)}</h3></div><button class="copy-btn" title="复制提示词" data-copy-id="${item.id}">${ICON_COPY}</button></div><p class="prompt-text clamp">${escapeHTML(item.prompt)}</p>${item.prompt.length>180?`<button class="expand-btn" data-expand>展开全文 ↓</button>`:""}</div></article>`).join("")}</div></section>`;
    }
    function searchView(query) {
      const q = query.trim().toLowerCase();
      const results = allItems.filter(item => item.title.toLowerCase().includes(q));
      currentSection = "search";
      document.getElementById("crumb").textContent = "搜索结果";
      if (!results.length) return `<section><p class="eyebrow">SEARCH</p><h2 class="hero-title" style="font-size:46px">“${escapeHTML(query)}”</h2><div class="empty" style="margin-top:34px"><strong>没有找到匹配内容</strong>换一个任务词试试，例如「头发」「去背景」「4K」或「下雪」。</div></section>`;
      return `<section><p class="eyebrow">SEARCH</p><h2 class="hero-title" style="font-size:46px">“${escapeHTML(query)}”</h2><p class="search-summary">找到 ${results.length} 个相关节点</p><div class="search-results">${results.map(item=>card(item,{tag:sectionMeta[item.section].name})).join("")}</div></section>`;
    }
    function render(section=currentSection) {
      const query = document.getElementById("search").value;
      const content = document.getElementById("content");
      if (query.trim()) content.innerHTML = searchView(query);
      else {
        currentSection = section === "search" ? "overview" : section;
        content.innerHTML = currentSection === "overview" ? overview() : currentSection === "formula" ? formulaView() : currentSection === "oneClick" ? oneClickView() : currentSection === "examples" ? examplesView() : workflowView(currentSection);
      }
      updateNav(); window.scrollTo({top:0,behavior:"smooth"});
    }
    function sectionText(section) {
      if (section === "formula") return DATA.formulaText;
      const items = DATA[section] || [];
      return items.map(item => `${item.step ? `第${item.step}步 · ` : ""}${item.title}\n${item.prompt}`).join("\n\n──────────\n\n");
    }

    document.addEventListener("click", event => {
      const navButton = event.target.closest("[data-section]");
      const jumpButton = event.target.closest("[data-section-jump]");
      if (navButton) { currentSection = navButton.dataset.section; document.getElementById("search").value=""; render(currentSection); document.body.classList.remove("menu-open"); }
      if (jumpButton) { currentSection = jumpButton.dataset.sectionJump; render(currentSection); }
      const copyButton = event.target.closest("[data-copy-id]");
      if (copyButton) copyText(byId[copyButton.dataset.copyId].prompt, copyButton);
      const special = event.target.closest("[data-copy-special]");
      if (special) copyText(DATA.formulaText, special);
      const copySection = event.target.closest("[data-copy-section]");
      if (copySection) copyText(sectionText(copySection.dataset.copySection), copySection);
      const expand = event.target.closest("[data-expand]");
      if (expand) { const parent=expand.closest(".prompt-card"); parent.classList.toggle("expanded"); expand.textContent=parent.classList.contains("expanded")?"收起全文 ↑":"展开全文 ↓"; }
      if (event.target.closest("[data-collapse]")) document.querySelectorAll(".prompt-card.expanded").forEach(card=>{card.classList.remove("expanded"); const btn=card.querySelector("[data-expand]"); if(btn)btn.textContent="展开全文 ↓";});
    });
    document.getElementById("search").addEventListener("input", () => render(currentSection));
    document.getElementById("mobileMenu").addEventListener("click", () => document.body.classList.toggle("menu-open"));
    document.addEventListener("keydown", event => {
      if (event.key === "/" && document.activeElement.tagName !== "INPUT") { event.preventDefault(); document.getElementById("search").focus(); }
      if (event.key === "Escape") { document.getElementById("search").value=""; document.getElementById("search").blur(); render(currentSection); }
    });
    updateNav(); render("overview");
  </script>
</body>
</html>
